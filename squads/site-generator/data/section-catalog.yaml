# =============================================================================
# CATEGORIA: CTA - CHAMADA PARA ACAO (4 secoes)
# Secoes de chamada para acao
# =============================================================================
cta:

  - id: cta-centered
    name: "Chamada para Acao Centralizada"
    category: cta
    description: >
      Bloco de chamada para acao centralizado com headline persuasiva,
      texto de suporte curto, botao de acao grande e elementos de
      confianca (garantia, prova social micro). Formato classico e
      versantil para qualquer tipo de pagina.
    copy_elements:
      - "{{cta_headline}}"
      - "{{cta_subtext}}"
      - "{{cta_button_text}}"
      - "{{cta_below_button_text}}"
      - "{{trust_element}}"
    recommended_for:
      - landing
      - sales
      - squeeze
      - webinar
      - thank_you
    copy_agent: cta-engineer
    design_pattern: "centered-cta-block"

  - id: cta-split
    name: "Chamada para Acao Dividida"
    category: cta
    description: >
      Chamada para acao em formato de duas colunas: copy persuasiva na
      esquerda e formulario ou botao de acao na direita. Ideal para
      paginas que precisam de argumentacao adicional junto ao ponto
      de conversao.
    copy_elements:
      - "{{cta_headline}}"
      - "{{cta_body_text}}"
      - "{{cta_bullet_1}}"
      - "{{cta_bullet_2}}"
      - "{{cta_bullet_3}}"
      - "{{cta_button_text}}"
      - "{{cta_guarantee_micro}}"
    recommended_for:
      - landing
      - sales
    copy_agent: cta-engineer
    design_pattern: "split-cta-block"

  - id: cta-floating
    name: "Chamada para Acao Flutuante"
    category: cta
    description: >
      Barra fixa que acompanha o scroll do visitante, sempre visivel
      na parte inferior ou superior da tela. Contem texto curto e
      botao de acao. Ideal para paginas longas onde o visitante pode
      decidir comprar em qualquer ponto da leitura.
    copy_elements:
      - "{{cta_short_text}}"
      - "{{cta_button_text}}"
      - "{{cta_price_display}}"
    recommended_for:
      - sales
    copy_agent: cta-engineer
    design_pattern: "floating-sticky-bar"

  - id: cta-urgency
    name: "Chamada para Acao com Urgencia"
    category: cta
    description: >
      Bloco de chamada para acao com elementos de urgencia e escassez:
      contagem regressiva, vagas limitadas, preco que vai subir ou
      bonus que vai expirar. Utiliza cores quentes e tipografia
      grande para criar sensacao de imediatismo.
    copy_elements:
      - "{{cta_headline}}"
      - "{{urgency_message}}"
      - "{{countdown_label}}"
      - "{{scarcity_text}}"
      - "{{cta_button_text}}"
      - "{{cta_below_button_text}}"
      - "{{deadline_text}}"
      - "{{guarantee_micro}}"
    recommended_for:
      - sales
      - webinar
    copy_agent: cta-engineer
    design_pattern: "urgency-cta-block"

# =============================================================================
# CATEGORIA: GUARANTEE (2 secoes)
# Secoes de garantia e reversao de risco
# =============================================================================
guarantee:

  - id: guarantee-badge
    name: "Selo de Garantia"
    category: guarantee
    description: >
      Selo visual de garantia compacto, geralmente posicionado proximo
      ao preco ou a chamada para acao. Inclui icone de selo ou escudo,
      periodo de garantia e texto curto de reversao de risco.
    copy_elements:
      - "{{guarantee_type}}"
      - "{{guarantee_duration}}"
      - "{{guarantee_short_text}}"
    recommended_for:
      - landing
      - sales
      - webinar
    copy_agent: cta-engineer
    design_pattern: "badge-compact"

  - id: guarantee-full-section
    name: "Secao Completa de Garantia"
    category: guarantee
    description: >
      Secao dedicada exclusivamente a garantia, com headline, explicacao
      detalhada da politica de garantia, termos claros e selo visual
      grande. Posicionada estrategicamente antes da chamada para acao
      final para eliminar o ultimo resquicio de medo.
    copy_elements:
      - "{{section_headline}}"
      - "{{guarantee_name}}"
      - "{{guarantee_duration}}"
      - "{{guarantee_explanation}}"
      - "{{guarantee_terms}}"
      - "{{guarantee_promise}}"
      - "{{risk_reversal_statement}}"
    recommended_for:
      - sales
      - webinar
    copy_agent: objection-handler
    design_pattern: "full-width-guarantee"

# =============================================================================
# CATEGORIA: HEADER (2 secoes)
# Cabecalho da pagina — navegacao e marca
# =============================================================================
header:

  - id: header-simple
    name: "Header Simples"
    category: header
    description: >
      Cabecalho simples com logo a esquerda e chamada para acao a direita.
      Sem menu de navegacao para evitar distracao e manter o foco do
      visitante na conversao. Ideal para paginas de captura e vendas.
    copy_elements:
      - "{{brand_name}}"
      - "{{header_cta_text}}"
    recommended_for:
      - landing
      - squeeze
      - webinar
      - thank_you
    copy_agent: cta-engineer
    design_pattern: "simple-header"

  - id: header-sticky
    name: "Header Fixo com Progresso"
    category: header
    description: >
      Cabecalho que permanece fixo no topo durante o scroll, com logo,
      indicador de progresso de leitura opcional e botao de chamada
      para acao sempre visivel. Ideal para paginas de vendas longas.
    copy_elements:
      - "{{brand_name}}"
      - "{{header_cta_text}}"
      - "{{progress_label}}"
    recommended_for:
      - sales
      - webinar
    copy_agent: cta-engineer
    design_pattern: "sticky-header"

# =============================================================================
# CATEGORIA: FOOTER (2 secoes)
# Rodape da pagina
# =============================================================================
footer:

  - id: footer-minimal
    name: "Footer Minimalista"
    category: footer
    description: >
      Rodape minimalista com apenas o copyright, politica de privacidade
      e termos de uso. Sem links de navegacao adicionais para manter
      o foco na conversao.
    copy_elements:
      - "{{brand_name}}"
      - "{{copyright_text}}"
      - "{{privacy_link_text}}"
      - "{{terms_link_text}}"
      - "{{disclaimer_text}}"
    recommended_for:
      - landing
      - squeeze
      - webinar
      - thank_you
    copy_agent: body-copy-architect
    design_pattern: "minimal-footer"

  - id: footer-full
    name: "Footer Completo"
    category: footer
    description: >
      Rodape completo com multiplas colunas: sobre a empresa, links uteis,
      contato, redes sociais e informacoes legais. Ideal para paginas de
      vendas que precisam transmitir legitimidade e profissionalismo.
    copy_elements:
      - "{{brand_name}}"
      - "{{brand_description}}"
      - "{{contact_email}}"
      - "{{contact_phone}}"
      - "{{address}}"
      - "{{social_links}}"
      - "{{useful_links}}"
      - "{{copyright_text}}"
      - "{{privacy_link_text}}"
      - "{{terms_link_text}}"
      - "{{disclaimer_text}}"
      - "{{cnpj_or_company_info}}"
    recommended_for:
      - sales
    copy_agent: body-copy-architect
    design_pattern: "multi-column-footer"

