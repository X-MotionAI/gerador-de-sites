# =============================================================================
# SECTION CATALOG — CATALOGO COMPLETO DE 37 TEMPLATES DE SECAO
# Cada secao define seus elementos de copy, padrao de design e
# tipos de pagina recomendados
# =============================================================================

version: "1.0.0"
last_updated: "2026-03-29"
total_sections: 37

# =============================================================================
# CATEGORIA: HERO (5 secoes)
# Secao principal acima da dobra — primeira impressao do visitante
# =============================================================================
hero:

  - id: hero-centered
    name: "Hero Centralizado"
    category: hero
    description: >
      Layout de hero com headline, subheadline e chamada para acao centralizados
      na pagina. Imagem ou video opcional como fundo. Ideal para mensagens
      claras e diretas que nao precisam de elementos visuais complexos.
    copy_elements:
      - "{{headline}}"
      - "{{subheadline}}"
      - "{{cta_primary_text}}"
      - "{{cta_secondary_text}}"
      - "{{social_proof_micro}}"
    recommended_for:
      - landing
      - thank_you
      - squeeze
    copy_agent: headline-sniper
    design_pattern: "centered-stack"

  - id: hero-split
    name: "Hero Dividido"
    category: hero
    description: >
      Layout de hero com duas colunas: copy na esquerda e imagem, video ou
      formulario na direita. Perfeito para landing pages que precisam de
      um formulario de captura visivel imediatamente acima da dobra.
    copy_elements:
      - "{{headline}}"
      - "{{subheadline}}"
      - "{{body_intro}}"
      - "{{cta_primary_text}}"
      - "{{form_headline}}"
      - "{{form_submit_text}}"
      - "{{trust_badges_text}}"
    recommended_for:
      - landing
      - webinar
    copy_agent: headline-sniper
    design_pattern: "two-column-split"

  - id: hero-video
    name: "Hero com Video"
    category: hero
    description: >
      Layout de hero centrado em um video de vendas ou demonstracao.
      Headline acima do video, subheadline e chamada para acao abaixo.
      Ideal para paginas de vendas com Video Sales Letter e paginas de webinario.
    copy_elements:
      - "{{headline}}"
      - "{{subheadline}}"
      - "{{video_caption}}"
      - "{{cta_primary_text}}"
      - "{{cta_below_video_text}}"
      - "{{social_proof_micro}}"
    recommended_for:
      - sales
      - webinar
    copy_agent: headline-sniper
    design_pattern: "video-centered"

  - id: hero-diagonal
    name: "Hero Diagonal"
    category: hero
    description: >
      Layout de hero com divisao diagonal entre a area de copy e a area
      visual. Cria um impacto visual forte e moderno, ideal para paginas
      que precisam de uma primeira impressao marcante e diferenciada.
    copy_elements:
      - "{{headline}}"
      - "{{subheadline}}"
      - "{{body_intro}}"
      - "{{cta_primary_text}}"
      - "{{background_statement}}"
    recommended_for:
      - sales
      - landing
    copy_agent: headline-sniper
    design_pattern: "diagonal-split"

  - id: hero-minimal
    name: "Hero Minimalista"
    category: hero
    description: >
      Layout de hero ultra-simplificado com apenas headline, uma linha de
      subheadline e chamada para acao. Sem imagens, sem video, sem distracao.
      Ideal para squeeze pages e prospects completamente conscientes.
    copy_elements:
      - "{{headline}}"
      - "{{subheadline}}"
      - "{{cta_primary_text}}"
    recommended_for:
      - squeeze
      - thank_you
    copy_agent: headline-sniper
    design_pattern: "minimal-centered"

# =============================================================================
# CATEGORIA: PAIN POINTS (3 secoes)
# Secoes que exploram dores, problemas e frustraciones do prospect
# =============================================================================
pain_points:

  - id: pain-points-3-column
    name: "Pontos de Dor em 3 Colunas"
    category: pain_points
    description: >
      Tres colunas com icones, cada uma destacando uma dor ou frustracao
      especifica do prospect. Formato visual limpo que permite consumo
      rapido das informacoes.
    copy_elements:
      - "{{section_headline}}"
      - "{{pain_1_title}}"
      - "{{pain_1_description}}"
      - "{{pain_2_title}}"
      - "{{pain_2_description}}"
      - "{{pain_3_title}}"
      - "{{pain_3_description}}"
      - "{{transition_text}}"
    recommended_for:
      - landing
      - sales
      - webinar
    copy_agent: body-copy-architect
    design_pattern: "three-column-cards"

  - id: pain-points-storytelling
    name: "Pontos de Dor com Narrativa"
    category: pain_points
    description: >
      Secao narrativa longa que conta uma historia de identificacao,
      descrevendo o dia a dia do prospect com suas dores e frustracoes.
      Utiliza linguagem emocional e detalhes sensoriais para criar
      conexao profunda.
    copy_elements:
      - "{{section_headline}}"
      - "{{story_opening}}"
      - "{{pain_scenario_1}}"
      - "{{pain_scenario_2}}"
      - "{{pain_scenario_3}}"
      - "{{emotional_climax}}"
      - "{{transition_to_solution}}"
    recommended_for:
      - sales
      - webinar
    copy_agent: story-weaver
    design_pattern: "long-form-narrative"

  - id: pain-points-quiz
    name: "Pontos de Dor como Quiz"
    category: pain_points
    description: >
      Secao interativa onde o prospect responde perguntas do tipo
      'Voce se identifica com isso?' para cada dor. Cada resposta
      positiva aumenta o engajamento e a identificacao com o problema.
    copy_elements:
      - "{{section_headline}}"
      - "{{quiz_intro}}"
      - "{{question_1}}"
      - "{{question_2}}"
      - "{{question_3}}"
      - "{{question_4}}"
      - "{{question_5}}"
      - "{{quiz_result_text}}"
      - "{{transition_text}}"
    recommended_for:
      - sales
      - landing
    copy_agent: body-copy-architect
    design_pattern: "interactive-checklist"

# =============================================================================
# CATEGORIA: SOLUTION (4 secoes)
# Secoes que apresentam a solucao, produto ou servico
# =============================================================================
solution:

  - id: solution-features
    name: "Solucao por Funcionalidades"
    category: solution
    description: >
      Grid ou lista de funcionalidades e beneficios do produto, cada um
      com icone, titulo e descricao curta. Formato classico e eficaz
      para produtos com multiplas funcionalidades distintas.
    copy_elements:
      - "{{section_headline}}"
      - "{{section_subheadline}}"
      - "{{feature_1_title}}"
      - "{{feature_1_description}}"
      - "{{feature_1_benefit}}"
      - "{{feature_2_title}}"
      - "{{feature_2_description}}"
      - "{{feature_2_benefit}}"
      - "{{feature_3_title}}"
      - "{{feature_3_description}}"
      - "{{feature_3_benefit}}"
      - "{{feature_4_title}}"
      - "{{feature_4_description}}"
      - "{{feature_4_benefit}}"
      - "{{feature_5_title}}"
      - "{{feature_5_description}}"
      - "{{feature_5_benefit}}"
      - "{{feature_6_title}}"
      - "{{feature_6_description}}"
      - "{{feature_6_benefit}}"
    recommended_for:
      - landing
      - sales
      - webinar
    copy_agent: body-copy-architect
    design_pattern: "feature-grid"

  - id: solution-before-after
    name: "Solucao Antes e Depois"
    category: solution
    description: >
      Comparacao visual lado a lado entre a situacao antes (com o problema)
      e depois (com a solucao). Utiliza duas colunas contrastantes com
      cores e icones que reforcing a transformacao.
    copy_elements:
      - "{{section_headline}}"
      - "{{before_title}}"
      - "{{before_point_1}}"
      - "{{before_point_2}}"
      - "{{before_point_3}}"
      - "{{before_point_4}}"
      - "{{before_point_5}}"
      - "{{after_title}}"
      - "{{after_point_1}}"
      - "{{after_point_2}}"
      - "{{after_point_3}}"
      - "{{after_point_4}}"
      - "{{after_point_5}}"
      - "{{transformation_statement}}"
    recommended_for:
      - sales
      - landing
    copy_agent: body-copy-architect
    design_pattern: "two-column-contrast"

  - id: solution-mechanism
    name: "Mecanismo Unico da Solucao"
    category: solution
    description: >
      Secao que explica o mecanismo unico por tras da solucao — por que
      ela funciona de forma diferente de tudo que o prospect ja tentou.
      Utiliza diagramas, ilustracoes ou infograficos para tornar o
      mecanismo tangivel e compreensivel.
    copy_elements:
      - "{{section_headline}}"
      - "{{mechanism_intro}}"
      - "{{mechanism_name}}"
      - "{{mechanism_explanation}}"
      - "{{why_it_works}}"
      - "{{why_others_fail}}"
      - "{{proof_of_mechanism}}"
      - "{{transition_to_results}}"
    recommended_for:
      - sales
      - webinar
    copy_agent: body-copy-architect
    design_pattern: "explanatory-diagram"

  - id: solution-3-step
    name: "Solucao em 3 Passos"
    category: solution
    description: >
      Apresentacao da solucao como um processo simples de 3 passos.
      Reduz a complexidade percebida e torna a acao facil de visualizar.
      Cada passo tem um numero, titulo, descricao e icone ilustrativo.
    copy_elements:
      - "{{section_headline}}"
      - "{{section_subheadline}}"
      - "{{step_1_title}}"
      - "{{step_1_description}}"
      - "{{step_2_title}}"
      - "{{step_2_description}}"
      - "{{step_3_title}}"
      - "{{step_3_description}}"
      - "{{result_statement}}"
    recommended_for:
      - landing
      - sales
      - webinar
      - thank_you
    copy_agent: body-copy-architect
    design_pattern: "numbered-steps"

