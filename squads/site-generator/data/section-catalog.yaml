# =============================================================================
# CATEGORIA: PRICING (4 secoes)
# Secoes de precificacao e apresentacao de oferta
# =============================================================================
pricing:

  - id: pricing-single
    name: "Preco Unico"
    category: pricing
    description: >
      Apresentacao de preco unico com destaque visual para o valor,
      lista de itens inclusos e chamada para acao. Ideal para produtos
      com uma unica opcao de compra.
    copy_elements:
      - "{{section_headline}}"
      - "{{price_original}}"
      - "{{price_current}}"
      - "{{price_installment}}"
      - "{{included_item_1}}"
      - "{{included_item_2}}"
      - "{{included_item_3}}"
      - "{{included_item_4}}"
      - "{{included_item_5}}"
      - "{{cta_text}}"
      - "{{guarantee_micro}}"
      - "{{payment_methods_text}}"
    recommended_for:
      - landing
      - squeeze
    copy_agent: cta-engineer
    design_pattern: "single-price-card"

  - id: pricing-value-stack
    name: "Stack de Valor"
    category: pricing
    description: >
      Empilhamento visual de todo o valor da oferta: produto principal,
      bonus, materiais complementares, suporte — cada item com seu
      valor individual listado, culminando no preco total versus o
      preco que o prospect vai pagar. Tecnica classica de ancoragem.
    copy_elements:
      - "{{section_headline}}"
      - "{{main_product_name}}"
      - "{{main_product_value}}"
      - "{{main_product_description}}"
      - "{{bonus_1_name}}"
      - "{{bonus_1_value}}"
      - "{{bonus_1_description}}"
      - "{{bonus_2_name}}"
      - "{{bonus_2_value}}"
      - "{{bonus_2_description}}"
      - "{{bonus_3_name}}"
      - "{{bonus_3_value}}"
      - "{{bonus_3_description}}"
      - "{{total_value}}"
      - "{{actual_price}}"
      - "{{savings_amount}}"
      - "{{price_installment}}"
      - "{{cta_text}}"
      - "{{guarantee_text}}"
    recommended_for:
      - sales
      - webinar
    copy_agent: cta-engineer
    design_pattern: "value-stack-list"

  - id: pricing-comparison
    name: "Tabela Comparativa de Precos"
    category: pricing
    description: >
      Tabela comparativa com dois ou tres planos lado a lado, destacando
      o plano recomendado. Ideal para produtos com multiplas opcoes de
      compra ou niveis de acesso.
    copy_elements:
      - "{{section_headline}}"
      - "{{plan_1_name}}"
      - "{{plan_1_price}}"
      - "{{plan_1_features}}"
      - "{{plan_1_cta}}"
      - "{{plan_2_name}}"
      - "{{plan_2_price}}"
      - "{{plan_2_features}}"
      - "{{plan_2_cta}}"
      - "{{plan_2_badge}}"
      - "{{plan_3_name}}"
      - "{{plan_3_price}}"
      - "{{plan_3_features}}"
      - "{{plan_3_cta}}"
      - "{{comparison_note}}"
    recommended_for:
      - sales
    copy_agent: cta-engineer
    design_pattern: "comparison-table"

  - id: pricing-guarantee-combo
    name: "Preco com Garantia Integrada"
    category: pricing
    description: >
      Combinacao do bloco de preco com a garantia em uma unica secao
      coesa. O selo de garantia aparece visualmente integrado ao card
      de preco, reduzindo o risco percebido no momento da decisao.
    copy_elements:
      - "{{section_headline}}"
      - "{{price_original}}"
      - "{{price_current}}"
      - "{{price_installment}}"
      - "{{guarantee_type}}"
      - "{{guarantee_duration}}"
      - "{{guarantee_description}}"
      - "{{included_items_summary}}"
      - "{{cta_text}}"
      - "{{risk_reversal_statement}}"
    recommended_for:
      - sales
      - webinar
    copy_agent: cta-engineer
    design_pattern: "price-guarantee-combined"

