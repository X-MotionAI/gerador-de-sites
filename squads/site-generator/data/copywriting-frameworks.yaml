  # ---------------------------------------------------------------------------
  # Regras por tipo de pagina
  # ---------------------------------------------------------------------------
  by_page_type:

    landing:
      recommended_masters:
        - john-caples
        - david-ogilvy
        - joanna-wiebe
        - claude-hopkins
      framework_focus: "headline forte + beneficios claros + formulario otimizado"
      max_copy_length: 2000
      cta_frequency: "duas vezes na pagina (hero e final)"

    sales:
      recommended_masters:
        - gary-halbert
        - dan-kennedy
        - eugene-schwartz
        - alex-hormozi
        - joe-sugarman
      framework_focus: "narrativa longa + mecanismo unico + stack de valor + urgencia"
      max_copy_length: 5000
      cta_frequency: "tres a cinco vezes ao longo da pagina"

    squeeze:
      recommended_masters:
        - claude-hopkins
        - john-caples
        - joanna-wiebe
      framework_focus: "headline irresistivel + proposta de valor em uma frase + chamada para acao imediata"
      max_copy_length: 500
      cta_frequency: "uma vez, imediatamente visivel"

    webinar:
      recommended_masters:
        - russell-brunson
        - frank-kern
        - dan-kennedy
        - stefan-georgi
      framework_focus: "curiosidade + credenciais + topicos provocativos + urgencia temporal"
      max_copy_length: 2500
      cta_frequency: "duas a tres vezes (hero, meio, final)"

    thank_you:
      recommended_masters:
        - drayton-bird
        - jay-abraham
        - russell-brunson
      framework_focus: "reforco de decisao + proximos passos + upsell suave"
      max_copy_length: 1000
      cta_frequency: "uma a duas vezes"

  # ---------------------------------------------------------------------------
  # Combinacoes especiais (nivel de consciencia + tipo de pagina)
  # ---------------------------------------------------------------------------
  special_combinations:

    - awareness: unaware
      page_type: sales
      best_combination:
        primary: gary-halbert
        secondary: robert-collier
        tertiary: eugene-schwartz
      strategy: >
        Historia confessional longa que abre a consciencia do problema
        de forma gradual, utilizando entrada na conversa mental do
        prospect e canalizacao de desejos existentes.

    - awareness: problem_aware
      page_type: landing
      best_combination:
        primary: john-caples
        secondary: joanna-wiebe
        tertiary: victor-schwab
      strategy: >
        Headline que nomeia a dor com precisao, copy baseada na voz do
        cliente e estrutura classica de captacao de atencao seguida de
        demonstracao de beneficios.

    - awareness: solution_aware
      page_type: sales
      best_combination:
        primary: todd-brown
        secondary: alex-hormozi
        tertiary: russell-brunson
      strategy: >
        Mecanismo unico como diferenciador central, oferta irresistivel
        com empilhamento de valor e framework de quebra de falsas crencas.

    - awareness: product_aware
      page_type: sales
      best_combination:
        primary: robert-cialdini
        secondary: dan-kennedy
        tertiary: alex-hormozi
      strategy: >
        Gatilhos psicologicos sistematicos combinados com urgencia real,
        destruicao de objecoes e oferta tao valiosa que a inacao se torna
        irracional.

    - awareness: most_aware
      page_type: sales
      best_combination:
        primary: claude-hopkins
        secondary: robert-cialdini
        tertiary: drayton-bird
      strategy: >
        Oferta direta com preco claro, escassez real, prova social
        massiva e chamada para acao impossivel de ignorar. Minimo
        de texto, maximo de impacto.

    - awareness: problem_aware
      page_type: webinar
      best_combination:
        primary: russell-brunson
        secondary: frank-kern
        tertiary: stefan-georgi
      strategy: >
        Curiosidade sobre o que sera revelado, credenciais do apresentador
        que validam a autoridade, topicos provocativos que prometem
        resolver a dor identificada e urgencia de vagas limitadas.

    - awareness: solution_aware
      page_type: webinar
      best_combination:
        primary: todd-brown
        secondary: russell-brunson
        tertiary: frank-kern
      strategy: >
        Mecanismo unico como o segredo que sera revelado no webinario,
        framework de resultados antecipados mostrando que o metodo
        funciona, e estrutura de Perfect Webinar para o registro.
