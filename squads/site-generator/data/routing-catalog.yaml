# =============================================================================
# MAPEAMENTO DE INTENCOES DO USUARIO PARA TIPOS DE PAGINA
# =============================================================================
intent_mapping:

  # Intencoes que apontam para Landing Page
  landing:
    keywords:
      - "landing page"
      - "pagina de captura"
      - "capturar leads"
      - "gerar leads"
      - "captacao de leads"
      - "pagina de lead"
      - "lead magnet"
      - "ebook download"
      - "material gratuito"
      - "conteudo gratuito"
      - "isca digital"
    phrases:
      - "quero capturar emails"
      - "preciso de uma pagina para coletar leads"
      - "quero oferecer um material gratuito"
      - "criar uma pagina para meu lead magnet"
      - "pagina para download de ebook"
      - "quero construir minha lista de emails"
    fallback_awareness_level: "problem_aware"
    typical_conversion_goal: "email_capture"

  # Intencoes que apontam para Sales Page
  sales:
    keywords:
      - "pagina de vendas"
      - "sales page"
      - "vender produto"
      - "vender curso"
      - "vender servico"
      - "pagina de venda"
      - "carta de vendas"
      - "video sales letter"
      - "pagina de oferta"
      - "pagina comercial"
    phrases:
      - "quero vender meu produto"
      - "preciso de uma pagina para vender"
      - "criar uma pagina de vendas"
      - "pagina para vender meu curso online"
      - "quero uma pagina que converta em vendas"
      - "preciso de uma carta de vendas"
    fallback_awareness_level: "solution_aware"
    typical_conversion_goal: "purchase"

  # Intencoes que apontam para Squeeze Page
  squeeze:
    keywords:
      - "squeeze page"
      - "pagina simples de captura"
      - "captura minimalista"
      - "opt-in page"
      - "pagina de opt-in"
      - "captura rapida"
      - "pagina enxuta"
    phrases:
      - "quero algo simples para capturar emails"
      - "preciso de uma pagina bem minimalista"
      - "so preciso de headline e formulario"
      - "pagina rapida de captura"
      - "algo simples e direto para coletar leads"
    fallback_awareness_level: "problem_aware"
    typical_conversion_goal: "email_capture"

  # Intencoes que apontam para Webinar Page
  webinar:
    keywords:
      - "webinar"
      - "webinario"
      - "live"
      - "aula ao vivo"
      - "masterclass"
      - "workshop online"
      - "evento online"
      - "treinamento ao vivo"
      - "aula gratuita"
      - "palestra online"
    phrases:
      - "quero uma pagina para meu webinario"
      - "preciso de inscricao para minha live"
      - "criar pagina de registro para aula ao vivo"
      - "pagina para minha masterclass"
      - "quero registrar pessoas para meu evento"
      - "pagina com contagem regressiva para minha aula"
    fallback_awareness_level: "problem_aware"
    typical_conversion_goal: "webinar_registration"

  # Intencoes que apontam para Thank You Page
  thank_you:
    keywords:
      - "pagina de agradecimento"
      - "thank you page"
      - "obrigado"
      - "pagina de confirmacao"
      - "pos-compra"
      - "pos-inscricao"
      - "proximos passos"
      - "pagina de entrega"
    phrases:
      - "pagina que aparece apos a compra"
      - "preciso de uma pagina de obrigado"
      - "pagina para depois que a pessoa se inscrever"
      - "quero uma pagina de confirmacao"
      - "pagina com proximos passos apos o cadastro"
      - "pagina de pos-conversao com upsell"
    fallback_awareness_level: "most_aware"
    typical_conversion_goal: "next_step_engagement"

# =============================================================================
# REGRAS DE FALLBACK E DETECCAO AUTOMATICA
# =============================================================================
fallback_rules:
  default_page_type: "landing"
  ambiguous_intent_action: "ask_user"
  confidence_threshold: 0.7

  detection_priority:
    - check: "explicit_keywords"
      weight: 1.0
    - check: "phrase_matching"
      weight: 0.8
    - check: "context_inference"
      weight: 0.6
    - check: "awareness_level_hint"
      weight: 0.4

  when_multiple_matches:
    strategy: "highest_confidence"
    tiebreaker: "ask_user"
    present_options: true
