# =============================================================================
# ROUTING CATALOG — MASTER ROUTING CONFIGURATION
# Mapeamento central de tipos de pagina, intencoes do usuario e sequencias
# de pipeline para o Site Generator Framework
# =============================================================================

version: "1.0.0"
last_updated: "2026-03-29"

# =============================================================================
# MAPEAMENTO DE TIPOS DE PAGINA PARA PIPELINE E AGENTES
# =============================================================================
page_types:

  # ---------------------------------------------------------------------------
  # LANDING PAGE — Pagina de captura de leads com formulario
  # ---------------------------------------------------------------------------
  landing:
    display_name: "Landing Page"
    description: >
      Pagina de captura de leads com proposta de valor clara, formulario de
      captura e prova social. Ideal para campanhas de trafego pago e
      geracao de leads qualificados.
    focus: "captura_de_leads"

    pipeline_sequence:
      - stage: briefing
        owner: site-commander
        priority: critical
      - stage: strategy
        owner: strategy-captain
        agents: [market-researcher, offer-architect, audience-profiler]
        parallel: true
      - stage: copywriting
        owner: copy-captain
        agents: [headline-sniper, body-copy-architect, cta-engineer, objection-handler]
        execution_order: [headline-sniper, body-copy-architect, [cta-engineer, objection-handler]]
      - stage: design
        owner: design-captain
        agents: [layout-architect, visual-hierarchy-specialist, responsive-engineer, color-typography-specialist, icon-imagery-curator]
        parallel: true
      - stage: development
        owner: dev-captain
        agents: [html-architect, css-engineer, javascript-specialist, form-builder, integration-specialist, performance-optimizer]
        execution_order: [html-architect, css-engineer, [javascript-specialist, form-builder], integration-specialist, performance-optimizer]
      - stage: conversion
        owner: conversion-captain
        agents: [cro-specialist, analytics-engineer, seo-specialist, trust-signal-specialist]
        parallel: true
      - stage: quality
        owner: quality-captain
        agents: [copy-reviewer, ux-auditor, accessibility-checker, cross-browser-tester]
        parallel: true
      - stage: delivery
        owner: site-commander
        priority: critical

    active_agents:
      - site-commander
      - strategy-captain
      - market-researcher
      - offer-architect
      - audience-profiler
      - copy-captain
      - headline-sniper
      - body-copy-architect
      - cta-engineer
      - objection-handler
