# =============================================================================
# DESIGN TOKENS — TOKENS DE DESIGN PADRAO E PRESETS TEMATICOS
# Sistema de tokens reutilizaveis para cores, tipografia, espacamento,
# bordas e sombras em todos os sites gerados pelo framework
# =============================================================================

version: "1.0.0"
last_updated: "2026-03-29"

# =============================================================================
# TEMA PADRAO (DEFAULT)
# =============================================================================
default:
  name: "Default Theme"
  description: >
    Tema padrao do framework com paleta roxa e acento ambar. Equilibra
    profissionalismo com energia visual. Adequado para a maioria dos
    nichos e tipos de pagina.

  colors:
    background: "#ffffff"
    background_alt: "#f8fafc"
    text: "#0f172a"
    text_secondary: "#475569"
    text_muted: "#94a3b8"
    primary: "#6366f1"
    primary_hover: "#4f46e5"
    primary_foreground: "#ffffff"
    secondary: "#8b5cf6"
    secondary_hover: "#7c3aed"
    secondary_foreground: "#ffffff"
    accent: "#f59e0b"
    accent_hover: "#d97706"
    accent_foreground: "#0f172a"
    muted: "#f1f5f9"
    muted_foreground: "#64748b"
    surface: "#ffffff"
    surface_elevated: "#ffffff"
    border: "#e2e8f0"
    border_strong: "#cbd5e1"
    success: "#10b981"
    success_foreground: "#ffffff"
    warning: "#f59e0b"
    warning_foreground: "#0f172a"
    destructive: "#ef4444"
    destructive_foreground: "#ffffff"
    info: "#3b82f6"
    info_foreground: "#ffffff"
    overlay: "rgba(15, 23, 42, 0.5)"

    # Cores especificas para secoes de copy
    pain_section_background: "#fef2f2"
    pain_section_text: "#991b1b"
    solution_section_background: "#f0fdf4"
    solution_section_text: "#166534"
    cta_section_background: "#6366f1"
    cta_section_text: "#ffffff"
    guarantee_section_background: "#fffbeb"
    guarantee_section_border: "#f59e0b"
    pricing_highlight_background: "#6366f1"
    pricing_highlight_text: "#ffffff"
    testimonial_background: "#f8fafc"
    testimonial_border: "#e2e8f0"

  fonts:
    heading:
      family: "Inter"
      fallback: "system-ui, -apple-system, sans-serif"
      weights:
        normal: 600
        bold: 700
        extra_bold: 800
      letter_spacing: "-0.025em"
      line_height: 1.2
    body:
      family: "Inter"
      fallback: "system-ui, -apple-system, sans-serif"
      weights:
        light: 300
        normal: 400
        medium: 500
        semibold: 600
      letter_spacing: "0"
      line_height: 1.6
    sizes:
      hero_headline: "clamp(2.5rem, 5vw, 4.5rem)"
      section_headline: "clamp(1.875rem, 3.5vw, 3rem)"
      subsection_headline: "clamp(1.25rem, 2.5vw, 1.875rem)"
      body_large: "1.25rem"
      body_default: "1.0625rem"
      body_small: "0.875rem"
      caption: "0.75rem"
      button: "1.0625rem"
      nav: "0.9375rem"

  spacing:
    section_padding_y: "5rem"
    section_padding_y_mobile: "3rem"
    container_max_width: "1200px"
    container_padding_x: "1.5rem"
    container_padding_x_mobile: "1rem"
    element_gap_large: "3rem"
    element_gap_medium: "2rem"
    element_gap_small: "1rem"
    element_gap_tiny: "0.5rem"
    stack_gap: "1.5rem"
    card_padding: "2rem"
    card_padding_mobile: "1.5rem"
    button_padding_x: "2rem"
    button_padding_y: "0.875rem"
    input_padding_x: "1rem"
    input_padding_y: "0.75rem"
    header_height: "4rem"
    footer_padding_y: "3rem"

  border_radius:
    none: "0"
    small: "0.375rem"
    default: "0.5rem"
    medium: "0.75rem"
    large: "1rem"
    extra_large: "1.5rem"
    full: "9999px"
    button: "0.5rem"
    card: "0.75rem"
    input: "0.5rem"
    badge: "9999px"
    image: "0.75rem"

  shadows:
    none: "none"
    small: "0 1px 2px 0 rgba(0, 0, 0, 0.05)"
    default: "0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1)"
    medium: "0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1)"
    large: "0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1)"
    extra_large: "0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1)"
    inner: "inset 0 2px 4px 0 rgba(0, 0, 0, 0.05)"
    card: "0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1)"
    card_hover: "0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1)"
    button: "0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1)"
    button_hover: "0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1)"
    floating_bar: "0 -4px 6px -1px rgba(0, 0, 0, 0.1)"

  transitions:
    default: "all 0.2s ease-in-out"
    fast: "all 0.15s ease-in-out"
    slow: "all 0.3s ease-in-out"
    color: "color 0.2s ease-in-out, background-color 0.2s ease-in-out, border-color 0.2s ease-in-out"
    transform: "transform 0.2s ease-in-out"
    opacity: "opacity 0.2s ease-in-out"

  breakpoints:
    mobile: "320px"
    tablet: "768px"
    desktop: "1024px"
    wide: "1440px"

