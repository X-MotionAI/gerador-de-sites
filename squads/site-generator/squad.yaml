      - id: headline-sniper
        name: "Helena"
        rank: Lieutenant
        tier: 2
        file: agents/copy/headline-sniper.md
      - id: body-copy-architect
        name: "Bruno"
        rank: Lieutenant
        tier: 2
        file: agents/copy/body-copy-architect.md
      - id: story-weaver
        name: "Sophia"
        rank: Lieutenant
        tier: 2
        file: agents/copy/story-weaver.md
      - id: cta-engineer
        name: "Carlos"
        rank: Sergeant
        tier: 3
        file: agents/copy/cta-engineer.md
      - id: objection-handler
        name: "Oliver"
        rank: Sergeant
        tier: 3
        file: agents/copy/objection-handler.md
      - id: email-sequence-writer
