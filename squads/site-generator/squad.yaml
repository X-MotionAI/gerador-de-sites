        file: agents/strategy/market-researcher.md
      - id: offer-architect
        name: "Oscar"
        rank: Lieutenant
        tier: 2
        file: agents/strategy/offer-architect.md
      - id: audience-profiler
        name: "Aurora"
        rank: Sergeant
        tier: 3
        file: agents/strategy/audience-profiler.md
      - id: competitor-analyst
        name: "Caesar"
        rank: Sergeant
