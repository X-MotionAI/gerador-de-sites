# =============================================================================
# SITE GENERATOR FRAMEWORK — SQUAD MANIFEST
# Arquitetura XQUADS para geracao de sites de alta conversao
# =============================================================================

squad:
  name: "Site Generator"
  version: "1.0.0"
  description: >
    Framework completo de geracao de sites de alta conversao utilizando
    a arquitetura XQUADS (eXtended Quality-driven Unified Agent Deployment System).
    Orquestra 38 agentes especializados em 6 esquadras para produzir paginas
    de vendas, captura, webinario, agradecimento e landing pages com copy
    persuasiva, design responsivo e otimizacao para conversao.
  author: "ArtCode Framework"
  created: "2026-03-29"

# =============================================================================
# HIERARQUIA DE TIERS
# =============================================================================
tier_definitions:
  tier_0:
    name: "Comando Supremo"
    description: "Orquestrador principal que controla todo o pipeline"
    max_agents: 1
  tier_1:
    name: "Capitaes de Esquadra"
    description: "Roteadores especializados que coordenam suas respectivas esquadras"
    max_agents: 6
  tier_2:
    name: "Tenentes Especialistas"
    description: "Executores de alto nivel com dominio profundo em frameworks especificos"
    max_agents: 15
  tier_3:
    name: "Sargentos e Recrutas"
    description: "Executores de tarefas especificas e agentes de suporte"
    max_agents: 16

# =============================================================================
# ESQUADRAS (SQUADS)
# =============================================================================
squads:

