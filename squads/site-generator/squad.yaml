# =============================================================================
# MATRIZ DE HANDOFF (QUEM ALIMENTA QUEM)
# =============================================================================
handoff_matrix:

  # Tier 0 -> Tier 1 (Comandante distribui para Capitaes)
  - from: site-commander
    to: [strategy-captain, copy-captain, design-captain, dev-captain, conversion-captain, quality-captain]
    trigger: "pipeline_start"
    data: "briefing_completo"

  # Estrategia -> Copy (Estrategia alimenta Copywriting)
  - from: strategy-captain
    to: [copy-captain]
    trigger: "strategy_complete"
    data: "strategic_package"
    contents:
      - market_landscape
      - offer_structure
      - audience_profiles
      - competitive_positioning

  # Estrategia -> Design (Estrategia alimenta Design)
  - from: strategy-captain
    to: [design-captain]
    trigger: "strategy_complete"
    data: "brand_positioning"

  # Copy -> Design (Copy alimenta Design com conteudo)
  - from: copy-captain
    to: [design-captain]
    trigger: "copy_approved"
    data: "copy_package"
    contents:
      - headlines
      - body_copy
      - cta_texts
      - testimonial_copy
      - faq_content

  # Design -> Desenvolvimento (Design alimenta Desenvolvimento)
  - from: design-captain
    to: [dev-captain]
    trigger: "design_approved"
    data: "design_specs"
    contents:
      - layout_structure
      - visual_hierarchy
      - responsive_breakpoints
      - component_library
      - color_palette
      - typography_system

  # Copy -> Desenvolvimento (Copy alimenta Desenvolvimento com textos finais)
  - from: copy-captain
    to: [dev-captain]
    trigger: "copy_approved"
    data: "final_copy"

  # Desenvolvimento -> Conversao (Desenvolvimento alimenta Conversao)
  - from: dev-captain
    to: [conversion-captain]
    trigger: "build_complete"
    data: "page_build"

  # Conversao -> Qualidade (Conversao alimenta Qualidade)
  - from: conversion-captain
    to: [quality-captain]
    trigger: "optimization_complete"
    data: "optimized_page"

  # Qualidade -> Comandante (Qualidade reporta ao Comandante)
  - from: quality-captain
    to: [site-commander]
    trigger: "qa_complete"
    data: "quality_report"

  # Loops de feedback internos das esquadras
  - from: market-researcher
    to: [offer-architect, audience-profiler]
    trigger: "market_data_ready"
    data: "market_landscape"

  - from: audience-profiler
    to: [offer-architect, copy-captain]
    trigger: "profiles_ready"
    data: "audience_profiles"

  - from: headline-sniper
    to: [body-copy-architect]
    trigger: "headlines_approved"
    data: "approved_headlines"

  - from: story-weaver
    to: [body-copy-architect]
    trigger: "narrative_ready"
    data: "story_structure"

  - from: body-copy-architect
    to: [cta-engineer, objection-handler]
    trigger: "body_copy_ready"
    data: "body_copy_draft"

  - from: objection-handler
    to: [cta-engineer]
    trigger: "objections_handled"
    data: "objection_responses"

# =============================================================================
# DEFINICAO DO PIPELINE
# =============================================================================
pipeline:
  name: "Site Generation Pipeline"
  description: "Pipeline completo de geracao de site de alta conversao"

  stages:
    - stage: 1
      name: "Briefing e Diagnostico"
      owner: site-commander
      description: "Recebe o briefing do usuario, diagnostica o tipo de pagina e constroi o pipeline"
      outputs: [pipeline_plan, page_type, briefing_structured]
      max_duration_minutes: 5

    - stage: 2
      name: "Estrategia e Inteligencia"
      owner: strategy-captain
      description: "Analise de mercado, construcao de oferta, perfil de audiencia e analise competitiva"
      agents: [market-researcher, offer-architect, audience-profiler, competitor-analyst]
      outputs: [market_landscape, offer_structure, audience_profiles, competitive_positioning]
      max_duration_minutes: 15
      parallel_execution: true

    - stage: 3
      name: "Copywriting"
      owner: copy-captain
      description: "Producao de toda a copy da pagina com base na estrategia definida"
      agents: [headline-sniper, body-copy-architect, story-weaver, cta-engineer, objection-handler, email-sequence-writer]
      outputs: [headlines, body_copy, story_elements, cta_blocks, objection_responses, email_sequences]
      max_duration_minutes: 20
      parallel_execution: false
      execution_order: [headline-sniper, story-weaver, body-copy-architect, [cta-engineer, objection-handler], email-sequence-writer]

    - stage: 4
      name: "Design e Interface"
      owner: design-captain
      description: "Criacao do layout, hierarquia visual e sistema de design"
      agents: [layout-architect, visual-hierarchy-specialist, responsive-engineer, color-typography-specialist, icon-imagery-curator, animation-specialist]
      outputs: [layout_specs, visual_hierarchy, responsive_rules, design_tokens, imagery_guide, animation_specs]
      max_duration_minutes: 15
      parallel_execution: true

    - stage: 5
      name: "Desenvolvimento"
      owner: dev-captain
      description: "Geracao de codigo HTML, CSS e JavaScript"
      agents: [html-architect, css-engineer, javascript-specialist, form-builder, integration-specialist, performance-optimizer]
      outputs: [html_structure, css_styles, javascript_logic, form_components, integrations, performance_report]
      max_duration_minutes: 20
      parallel_execution: false
      execution_order: [html-architect, css-engineer, [javascript-specialist, form-builder], integration-specialist, performance-optimizer]

    - stage: 6
      name: "Otimizacao de Conversao"
      owner: conversion-captain
      description: "Otimizacao para conversao, SEO, analytics e sinais de confianca"
      agents: [cro-specialist, ab-test-architect, analytics-engineer, seo-specialist, trust-signal-specialist]
      outputs: [cro_recommendations, ab_test_plan, analytics_setup, seo_optimization, trust_elements]
      max_duration_minutes: 10
      parallel_execution: true

    - stage: 7
      name: "Revisao de Qualidade"
      owner: quality-captain
      description: "Revisao final de copy, experiencia do usuario, acessibilidade e compatibilidade"
      agents: [copy-reviewer, ux-auditor, accessibility-checker, cross-browser-tester]
      outputs: [copy_review, ux_audit, accessibility_report, browser_compatibility]
      max_duration_minutes: 10
      parallel_execution: true

    - stage: 8
      name: "Aprovacao e Entrega"
      owner: site-commander
      description: "Revisao final do Comandante, consolidacao e entrega ao usuario"
      outputs: [final_page, quality_score, delivery_report]
      max_duration_minutes: 5

  # Definicao dos tipos de pagina suportados e quais esquadras sao ativadas
  page_types:
    landing_page:
      description: "Pagina de captura de leads com formulario simples"
      required_squads: [strategy, copy, design, development, conversion, quality]
      skip_agents: [email-sequence-writer, ab-test-architect]
      focus: "captura_de_leads"

    sales_page:
      description: "Pagina de vendas longa com todos os elementos persuasivos"
      required_squads: [strategy, copy, design, development, conversion, quality]
      skip_agents: []
      focus: "venda_direta"

    squeeze_page:
      description: "Pagina de captura minimalista com foco em um unico CTA"
      required_squads: [strategy, copy, design, development, conversion, quality]
      skip_agents: [story-weaver, email-sequence-writer, ab-test-architect, competitor-analyst]
      focus: "captura_minimalista"

    webinar_page:
      description: "Pagina de registro para webinario com contagem regressiva"
      required_squads: [strategy, copy, design, development, conversion, quality]
      skip_agents: [competitor-analyst]
      focus: "registro_webinario"

    thank_you_page:
      description: "Pagina de agradecimento com proximos passos e upsell opcional"
      required_squads: [copy, design, development, quality]
      skip_agents: [market-researcher, competitor-analyst, audience-profiler, ab-test-architect, seo-specialist]
      focus: "pos_conversao"

# =============================================================================
# CONFIGURACOES GLOBAIS
# =============================================================================
global_settings:
  language: "pt-BR"
  default_tone: "profissional_persuasivo"
  quality_threshold: 7
  max_pipeline_retries: 2
  enable_parallel_execution: true
  output_format: "html"
  responsive_breakpoints: [320, 768, 1024, 1440]
  performance_budget:
    first_contentful_paint_ms: 1500
    largest_contentful_paint_ms: 2500
    total_blocking_time_ms: 200
    cumulative_layout_shift: 0.1
