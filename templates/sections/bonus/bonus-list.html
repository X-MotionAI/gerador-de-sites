<section style="
  padding: var(--section-padding, 5rem 1.5rem);
  background-color: var(--color-bg, #ffffff);
  color: var(--color-text, #1a1a2e);
  font-family: var(--font-body, system-ui, sans-serif);
">
  <div style="
    max-width: 680px;
    margin: 0 auto;
    text-align: center;
  ">
    <h2 style="
      font-family: var(--font-heading, system-ui, sans-serif);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 800;
      line-height: 1.2;
      margin: 0 0 2.5rem 0;
      color: var(--color-text, #1a1a2e);
    ">{{section_headline}}</h2>

    <div style="display: flex; flex-direction: column; gap: 1.25rem; text-align: left;">
      <!-- Bonus 1 -->
      <div style="
        background-color: var(--color-surface, #f9fafb);
        border: 1px solid var(--color-border, #e5e7eb);
        border-radius: var(--radius, 0.5rem);
        padding: 1.5rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        transition: box-shadow 0.2s ease, transform 0.2s ease;
      " onmouseover="this.style.boxShadow='0 8px 30px rgba(0,0,0,0.06)';this.style.transform='translateY(-2px)'" onmouseout="this.style.boxShadow='none';this.style.transform='translateY(0)'">
        <div style="flex: 1;">
          <div style="
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-primary, #4f46e5);
            background-color: rgba(79, 70, 229, 0.08);
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            margin-bottom: 0.5rem;
          ">Bonus 1</div>
          <h3 style="font-family: var(--font-heading, system-ui, sans-serif); font-size: 1.1rem; font-weight: 700; margin: 0 0 0.4rem 0; color: var(--color-text, #1a1a2e);">{{bonus_1_name}}</h3>
          <p style="font-size: 0.9rem; line-height: 1.6; color: var(--color-muted, #6b7280); margin: 0;">{{bonus_1_description}}</p>
        </div>
        <div style="
          font-family: var(--font-heading, system-ui, sans-serif);
          font-size: 1rem;
          font-weight: 700;
          color: var(--color-muted, #6b7280);
          text-decoration: line-through;
          white-space: nowrap;
          flex-shrink: 0;
        ">{{bonus_1_value}}</div>
      </div>

      <!-- Bonus 2 -->
      <div style="
        background-color: var(--color-surface, #f9fafb);
        border: 1px solid var(--color-border, #e5e7eb);
        border-radius: var(--radius, 0.5rem);
        padding: 1.5rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        transition: box-shadow 0.2s ease, transform 0.2s ease;
      " onmouseover="this.style.boxShadow='0 8px 30px rgba(0,0,0,0.06)';this.style.transform='translateY(-2px)'" onmouseout="this.style.boxShadow='none';this.style.transform='translateY(0)'">
        <div style="flex: 1;">
          <div style="display: inline-block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-primary, #4f46e5); background-color: rgba(79, 70, 229, 0.08); padding: 0.25rem 0.75rem; border-radius: 999px; margin-bottom: 0.5rem;">Bonus 2</div>
          <h3 style="font-family: var(--font-heading, system-ui, sans-serif); font-size: 1.1rem; font-weight: 700; margin: 0 0 0.4rem 0; color: var(--color-text, #1a1a2e);">{{bonus_2_name}}</h3>
          <p style="font-size: 0.9rem; line-height: 1.6; color: var(--color-muted, #6b7280); margin: 0;">{{bonus_2_description}}</p>
        </div>
        <div style="font-family: var(--font-heading, system-ui, sans-serif); font-size: 1rem; font-weight: 700; color: var(--color-muted, #6b7280); text-decoration: line-through; white-space: nowrap; flex-shrink: 0;">{{bonus_2_value}}</div>
      </div>

      <!-- Bonus 3 -->
      <div style="
        background-color: var(--color-surface, #f9fafb);
        border: 1px solid var(--color-border, #e5e7eb);
        border-radius: var(--radius, 0.5rem);
        padding: 1.5rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        transition: box-shadow 0.2s ease, transform 0.2s ease;
      " onmouseover="this.style.boxShadow='0 8px 30px rgba(0,0,0,0.06)';this.style.transform='translateY(-2px)'" onmouseout="this.style.boxShadow='none';this.style.transform='translateY(0)'">
        <div style="flex: 1;">
          <div style="display: inline-block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-primary, #4f46e5); background-color: rgba(79, 70, 229, 0.08); padding: 0.25rem 0.75rem; border-radius: 999px; margin-bottom: 0.5rem;">Bonus 3</div>
          <h3 style="font-family: var(--font-heading, system-ui, sans-serif); font-size: 1.1rem; font-weight: 700; margin: 0 0 0.4rem 0; color: var(--color-text, #1a1a2e);">{{bonus_3_name}}</h3>
          <p style="font-size: 0.9rem; line-height: 1.6; color: var(--color-muted, #6b7280); margin: 0;">{{bonus_3_description}}</p>
        </div>
        <div style="font-family: var(--font-heading, system-ui, sans-serif); font-size: 1rem; font-weight: 700; color: var(--color-muted, #6b7280); text-decoration: line-through; white-space: nowrap; flex-shrink: 0;">{{bonus_3_value}}</div>
      </div>
    </div>
  </div>
</section>
