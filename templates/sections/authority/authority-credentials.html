<section style="
  padding: var(--section-padding, 5rem 1.5rem);
  background-color: var(--color-bg, #ffffff);
  color: var(--color-text, #1a1a2e);
  font-family: var(--font-body, system-ui, sans-serif);
">
  <div style="
    max-width: var(--container-max, 1000px);
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr;
    gap: 3rem;
    align-items: center;
  ">
    <!-- Photo / Avatar -->
    <div style="text-align: center;">
      <img src="{{author_image}}" alt="{{author_name}}" style="
        width: clamp(160px, 30vw, 240px);
        height: clamp(160px, 30vw, 240px);
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid var(--color-primary, #4f46e5);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      " loading="lazy">
    </div>

    <!-- Credentials -->
    <div>
      <h2 style="
        font-family: var(--font-heading, system-ui, sans-serif);
        font-size: clamp(1.5rem, 4vw, 2.25rem);
        font-weight: 800;
        line-height: 1.2;
        margin: 0 0 0.5rem 0;
        color: var(--color-text, #1a1a2e);
      ">{{section_headline}}</h2>

      <p style="
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--color-primary, #4f46e5);
        margin: 0 0 1.5rem 0;
      ">{{author_name}}</p>

      <div style="
        font-size: 1rem;
        line-height: 2;
        color: var(--color-muted, #6b7280);
        margin-bottom: 2rem;
      ">{{credential_items}}</div>

      <p style="
        font-size: clamp(0.95rem, 2vw, 1.05rem);
        line-height: 1.7;
        color: var(--color-muted, #6b7280);
        margin: 0;
      ">{{author_bio}}</p>
    </div>
  </div>

  <style>
    @media (min-width: 768px) {
      section > div {
        grid-template-columns: auto 1fr !important;
      }
    }
  </style>
</section>
