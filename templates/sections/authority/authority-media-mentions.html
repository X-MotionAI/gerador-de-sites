<section style="
  padding: var(--section-padding, 5rem 1.5rem);
  background-color: var(--color-surface, #f9fafb);
  color: var(--color-text, #1a1a2e);
  font-family: var(--font-body, system-ui, sans-serif);
  text-align: center;
">
  <div style="
    max-width: var(--container-max, 1000px);
    margin: 0 auto;
  ">
    <p style="
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-muted, #6b7280);
      margin: 0 0 2.5rem 0;
    ">{{section_headline}}</p>

    <div style="
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: clamp(2rem, 4vw, 4rem);
      margin-bottom: 3rem;
    ">
      <img src="{{media_1_logo}}" alt="{{media_1_name}}" style="height: clamp(24px, 3.5vw, 36px); width: auto; opacity: 0.45; filter: grayscale(100%); transition: opacity 0.3s ease, filter 0.3s ease;" onmouseover="this.style.opacity='1';this.style.filter='grayscale(0%)'" onmouseout="this.style.opacity='0.45';this.style.filter='grayscale(100%)'" loading="lazy">
      <img src="{{media_2_logo}}" alt="{{media_2_name}}" style="height: clamp(24px, 3.5vw, 36px); width: auto; opacity: 0.45; filter: grayscale(100%); transition: opacity 0.3s ease, filter 0.3s ease;" onmouseover="this.style.opacity='1';this.style.filter='grayscale(0%)'" onmouseout="this.style.opacity='0.45';this.style.filter='grayscale(100%)'" loading="lazy">
      <img src="{{media_3_logo}}" alt="{{media_3_name}}" style="height: clamp(24px, 3.5vw, 36px); width: auto; opacity: 0.45; filter: grayscale(100%); transition: opacity 0.3s ease, filter 0.3s ease;" onmouseover="this.style.opacity='1';this.style.filter='grayscale(0%)'" onmouseout="this.style.opacity='0.45';this.style.filter='grayscale(100%)'" loading="lazy">
      <img src="{{media_4_logo}}" alt="{{media_4_name}}" style="height: clamp(24px, 3.5vw, 36px); width: auto; opacity: 0.45; filter: grayscale(100%); transition: opacity 0.3s ease, filter 0.3s ease;" onmouseover="this.style.opacity='1';this.style.filter='grayscale(0%)'" onmouseout="this.style.opacity='0.45';this.style.filter='grayscale(100%)'" loading="lazy">
      <img src="{{media_5_logo}}" alt="{{media_5_name}}" style="height: clamp(24px, 3.5vw, 36px); width: auto; opacity: 0.45; filter: grayscale(100%); transition: opacity 0.3s ease, filter 0.3s ease;" onmouseover="this.style.opacity='1';this.style.filter='grayscale(0%)'" onmouseout="this.style.opacity='0.45';this.style.filter='grayscale(100%)'" loading="lazy">
      <img src="{{media_6_logo}}" alt="{{media_6_name}}" style="height: clamp(24px, 3.5vw, 36px); width: auto; opacity: 0.45; filter: grayscale(100%); transition: opacity 0.3s ease, filter 0.3s ease;" onmouseover="this.style.opacity='1';this.style.filter='grayscale(0%)'" onmouseout="this.style.opacity='0.45';this.style.filter='grayscale(100%)'" loading="lazy">
    </div>

    <!-- Featured mention -->
    <div style="
      background-color: var(--color-bg, #ffffff);
      border: 1px solid var(--color-border, #e5e7eb);
      border-radius: var(--radius, 0.5rem);
      padding: 2rem;
      max-width: 600px;
      margin: 0 auto;
    ">
      <blockquote style="
        font-size: clamp(0.95rem, 2vw, 1.1rem);
        line-height: 1.7;
        color: var(--color-text, #1a1a2e);
        font-style: italic;
        margin: 0 0 1rem 0;
      ">"{{featured_quote}}"</blockquote>
      <div style="
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--color-muted, #6b7280);
      ">-- {{featured_source}}</div>
    </div>
  </div>
</section>
