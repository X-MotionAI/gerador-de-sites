<section style="
  padding: var(--section-padding, 5rem 1.5rem);
  background-color: var(--color-bg, #ffffff);
  color: var(--color-text, #1a1a2e);
  font-family: var(--font-body, system-ui, sans-serif);
">
  <div style="
    max-width: 720px;
    margin: 0 auto;
  ">
    <h2 style="
      font-family: var(--font-heading, system-ui, sans-serif);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 800;
      line-height: 1.2;
      margin: 0 0 2.5rem 0;
      color: var(--color-text, #1a1a2e);
      text-align: center;
    ">{{section_headline}}</h2>

    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
      <details style="
        background-color: var(--color-surface, #f9fafb);
        border: 1px solid var(--color-border, #e5e7eb);
        border-radius: var(--radius, 0.5rem);
        overflow: hidden;
      ">
        <summary style="
          padding: 1.25rem 1.5rem;
          font-size: 1rem;
          font-weight: 600;
          color: var(--color-text, #1a1a2e);
          cursor: pointer;
          list-style: none;
          display: flex;
          justify-content: space-between;
          align-items: center;
          transition: background-color 0.2s ease;
        " onmouseover="this.style.backgroundColor='var(--color-bg, #ffffff)'" onmouseout="this.style.backgroundColor='transparent'">
          {{faq_1_question}}
          <span style="font-size: 1.25rem; color: var(--color-muted, #6b7280); flex-shrink: 0; margin-left: 1rem;">+</span>
        </summary>
        <div style="padding: 0 1.5rem 1.25rem 1.5rem; font-size: 0.95rem; line-height: 1.7; color: var(--color-muted, #6b7280);">{{faq_1_answer}}</div>
      </details>

      <details style="background-color: var(--color-surface, #f9fafb); border: 1px solid var(--color-border, #e5e7eb); border-radius: var(--radius, 0.5rem); overflow: hidden;">

    details summary::-webkit-details-marker { display: none; }
    details[open] summary span:last-child { transform: rotate(45deg); }
