<footer style="
  padding: clamp(3rem, 5vw, 4rem) 1.5rem 2rem 1.5rem;
  background-color: var(--color-text, #1a1a2e);
  font-family: var(--font-body, system-ui, sans-serif);
">
  <div style="
    max-width: var(--container-max, 1200px);
    margin: 0 auto;
  ">
    <div style="
      display: grid;
      grid-template-columns: 1fr;
      gap: 2.5rem;
      margin-bottom: 3rem;
    ">
      <!-- Brand column -->
      <div>
        <img src="{{logo_src}}" alt="{{logo_alt}}" style="
          height: 36px;
          width: auto;
          margin-bottom: 1rem;
          filter: brightness(0) invert(1);
        " loading="lazy">
        <p style="
          font-size: 0.9rem;
          line-height: 1.7;
          color: rgba(255, 255, 255, 0.6);
          margin: 0;
          max-width: 280px;
        ">{{brand_description}}</p>
      </div>

      <!-- Links column 1 -->
      <div>
        <h4 style="
          font-family: var(--font-heading, system-ui, sans-serif);
          font-size: 0.85rem;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.08em;
          color: rgba(255, 255, 255, 0.9);
          margin: 0 0 1rem 0;
        ">{{column_1_title}}</h4>
        <div style="display: flex; flex-direction: column; gap: 0.6rem;">
          <a href="{{col1_link_1_url}}" style="font-size: 0.9rem; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s ease;" onmouseover="this.style.color='rgba(255,255,255,0.9)'" onmouseout="this.style.color='rgba(255,255,255,0.5)'">{{col1_link_1_text}}</a>
          <a href="{{col1_link_2_url}}" style="font-size: 0.9rem; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s ease;" onmouseover="this.style.color='rgba(255,255,255,0.9)'" onmouseout="this.style.color='rgba(255,255,255,0.5)'">{{col1_link_2_text}}</a>
          <a href="{{col1_link_3_url}}" style="font-size: 0.9rem; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s ease;" onmouseover="this.style.color='rgba(255,255,255,0.9)'" onmouseout="this.style.color='rgba(255,255,255,0.5)'">{{col1_link_3_text}}</a>
        </div>
      </div>

      <!-- Links column 2 -->
      <div>
        <h4 style="
          font-family: var(--font-heading, system-ui, sans-serif);
          font-size: 0.85rem;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.08em;
          color: rgba(255, 255, 255, 0.9);
          margin: 0 0 1rem 0;
        ">{{column_2_title}}</h4>
        <div style="display: flex; flex-direction: column; gap: 0.6rem;">
          <a href="{{col2_link_1_url}}" style="font-size: 0.9rem; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s ease;" onmouseover="this.style.color='rgba(255,255,255,0.9)'" onmouseout="this.style.color='rgba(255,255,255,0.5)'">{{col2_link_1_text}}</a>
          <a href="{{col2_link_2_url}}" style="font-size: 0.9rem; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s ease;" onmouseover="this.style.color='rgba(255,255,255,0.9)'" onmouseout="this.style.color='rgba(255,255,255,0.5)'">{{col2_link_2_text}}</a>
          <a href="{{col2_link_3_url}}" style="font-size: 0.9rem; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s ease;" onmouseover="this.style.color='rgba(255,255,255,0.9)'" onmouseout="this.style.color='rgba(255,255,255,0.5)'">{{col2_link_3_text}}</a>
        </div>
      </div>

      <!-- Contact column -->
      <div>
        <h4 style="
          font-family: var(--font-heading, system-ui, sans-serif);
          font-size: 0.85rem;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.08em;
          color: rgba(255, 255, 255, 0.9);
          margin: 0 0 1rem 0;
        ">{{column_3_title}}</h4>
        <div style="display: flex; flex-direction: column; gap: 0.6rem;">
          <span style="font-size: 0.9rem; color: rgba(255,255,255,0.5);">{{contact_email}}</span>
          <span style="font-size: 0.9rem; color: rgba(255,255,255,0.5);">{{contact_phone}}</span>
        </div>
      </div>
    </div>

    <!-- Bottom bar -->
    <div style="
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
      text-align: center;
    ">
      <p style="
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.4);
        margin: 0;
      ">{{copyright_text}}</p>
    </div>
  </div>

  <style>
    @media (min-width: 768px) {
      footer > div > div:first-child {
        grid-template-columns: 2fr 1fr 1fr 1fr !important;
      }
      footer > div > div:last-child {
        flex-direction: row !important;
        justify-content: space-between !important;
      }
    }
  </style>
</footer>
