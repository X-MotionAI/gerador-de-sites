<div style="
  display: inline-flex;
  align-items: center;
  gap: 0.75rem;
  background-color: var(--color-surface, #f9fafb);
  border: 1px solid var(--color-border, #e5e7eb);
  border-radius: var(--radius, 0.5rem);
  padding: 0.75rem 1.25rem;
  font-family: var(--font-body, system-ui, sans-serif);
">
  <div style="
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #f0fdf4;
    border-radius: 50%;
    font-size: 1.25rem;
    flex-shrink: 0;
  ">&#x1F6E1;</div>
  <div>
    <div style="
      font-size: 0.8rem;
      font-weight: 700;
      color: #16a34a;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    ">Garantia de {{guarantee_duration}}</div>
    <div style="
      font-size: 0.85rem;
      color: var(--color-muted, #6b7280);
      line-height: 1.4;
    ">{{guarantee_text}}</div>
  </div>
