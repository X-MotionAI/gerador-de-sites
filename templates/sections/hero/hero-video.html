<section style="
  position: relative;
  min-height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: var(--font-body, system-ui, sans-serif);
">
  <video autoplay muted loop playsinline poster="{{video_poster}}" style="
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  ">
    <source src="{{video_url}}" type="video/mp4">
  </video>

  <div style="
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.75) 100%);
    z-index: 1;
  "></div>

  <div style="
    position: relative;
    z-index: 2;
    max-width: var(--container-max, 800px);
    margin: 0 auto;
    padding: var(--section-padding, 5rem 1.5rem);
    text-align: center;
    width: 100%;
  ">
    <h1 style="
      font-family: var(--font-heading, system-ui, sans-serif);
      font-size: clamp(2rem, 5vw, 3.75rem);
      font-weight: 800;
      line-height: 1.1;
      margin: 0 0 1.25rem 0;
      color: #ffffff;
    ">{{headline}}</h1>

    <p style="
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
      margin: 0 auto 2.5rem auto;
      max-width: 600px;
    ">{{subheadline}}</p>

    <a href="{{cta_url}}" style="
      display: inline-block;
      background-color: var(--color-primary, #4f46e5);
      color: #ffffff;
      font-family: var(--font-body, system-ui, sans-serif);
      font-size: clamp(1rem, 2vw, 1.125rem);
      font-weight: 700;
      padding: 1rem 2.5rem;
      border-radius: var(--radius, 0.5rem);
      text-decoration: none;
      transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 20px rgba(79, 70, 229, 0.4);
    " onmouseover="this.style.backgroundColor='var(--color-secondary, #4338ca)';this.style.transform='translateY(-2px)'" onmouseout="this.style.backgroundColor='var(--color-primary, #4f46e5)';this.style.transform='translateY(0)'">{{cta_text}}</a>
  </div>
</section>
