<section style="
  padding: var(--section-padding, 5rem 1.5rem);
  background-color: var(--color-bg, #ffffff);
  color: var(--color-text, #1a1a2e);
  font-family: var(--font-body, system-ui, sans-serif);
  min-height: 90vh;
  display: flex;
  align-items: center;
">
  <div style="
    max-width: var(--container-max, 1200px);
    margin: 0 auto;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr;
    gap: 3rem;
    align-items: center;
  ">
    <div style="order: 2;">
      <span style="
        display: inline-block;
        background-color: var(--color-accent, #f0c040);
        color: var(--color-bg, #ffffff);
        font-family: var(--font-body, system-ui, sans-serif);
        font-size: clamp(0.75rem, 1.5vw, 0.875rem);
        font-weight: 600;
        padding: 0.4rem 1.2rem;
        border-radius: 999px;
        margin-bottom: 1.5rem;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      ">{{badge_text}}</span>

      <h1 style="
        font-family: var(--font-heading, system-ui, sans-serif);
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 800;
        line-height: 1.1;
        margin: 0 0 1.25rem 0;
        color: var(--color-text, #1a1a2e);
      ">{{headline}}</h1>

      <p style="
        font-size: clamp(1rem, 2vw, 1.2rem);
        line-height: 1.6;
        color: var(--color-muted, #6b7280);
        margin: 0 0 2rem 0;
        max-width: 520px;
      ">{{subheadline}}</p>

      <a href="{{cta_url}}" style="
        display: inline-block;
        background-color: var(--color-primary, #4f46e5);
        color: #ffffff;
        font-family: var(--font-body, system-ui, sans-serif);
        font-size: clamp(1rem, 2vw, 1.125rem);
        font-weight: 700;
        padding: 1rem 2.5rem;
        border-radius: var(--radius, 0.5rem);
        text-decoration: none;
        transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3);
      " onmouseover="this.style.backgroundColor='var(--color-secondary, #4338ca)';this.style.transform='translateY(-2px)'" onmouseout="this.style.backgroundColor='var(--color-primary, #4f46e5)';this.style.transform='translateY(0)'">{{cta_text}}</a>
    </div>

    <div style="order: 1;">
      <img src="{{hero_image}}" alt="{{hero_alt}}" style="
        width: 100%;
        height: auto;
        border-radius: var(--radius, 0.5rem);
        object-fit: cover;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
      " loading="lazy">
    </div>
  </div>

  <style>
    @media (min-width: 768px) {
      section > div:first-child {
        grid-template-columns: 1fr 1fr !important;
      }
      section > div:first-child > div:first-child {
        order: 1 !important;
      }
      section > div:first-child > div:last-child {
        order: 2 !important;
      }
    }
  </style>
</section>
