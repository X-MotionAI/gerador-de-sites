<section style="
  position: relative;
  min-height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-body, system-ui, sans-serif);
  background-image: url('{{bg_image}}');
  background-size: cover;
  background-position: center;
  overflow: hidden;
">
  <div style="
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, var(--color-primary, #4f46e5) 0%, var(--color-secondary, #4338ca) 100%);
    opacity: 0.88;
    z-index: 1;
  "></div>

  <div style="
    position: relative;
    z-index: 2;
    max-width: var(--container-max, 800px);
    margin: 0 auto;
    padding: 5rem 1.5rem 8rem 1.5rem;
    text-align: center;
    width: 100%;
  ">
    <h1 style="
      font-family: var(--font-heading, system-ui, sans-serif);
      font-size: clamp(2rem, 5vw, 3.75rem);
      font-weight: 800;
      line-height: 1.1;
      margin: 0 0 1.25rem 0;
      color: #ffffff;
    ">{{headline}}</h1>

    <p style="
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.88);
      margin: 0 auto 2.5rem auto;
      max-width: 600px;
    ">{{subheadline}}</p>

    <a href="{{cta_url}}" style="
      display: inline-block;
      background-color: var(--color-accent, #f0c040);
      color: var(--color-text, #1a1a2e);
      font-family: var(--font-body, system-ui, sans-serif);
      font-size: clamp(1rem, 2vw, 1.125rem);
      font-weight: 700;
      padding: 1rem 2.5rem;
      border-radius: var(--radius, 0.5rem);
      text-decoration: none;
      transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
    " onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(0,0,0,0.3)'" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 14px rgba(0,0,0,0.2)'">{{cta_text}}</a>
  </div>

  <div style="
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 100%;
    z-index: 3;
  ">
    <svg viewBox="0 0 1440 120" preserveAspectRatio="none" style="display: block; width: 100%; height: 80px;">
      <polygon fill="var(--color-bg, #ffffff)" points="0,120 1440,120 1440,0 0,120"></polygon>
    </svg>
  </div>
</section>
