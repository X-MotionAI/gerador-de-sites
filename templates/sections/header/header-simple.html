<header style="
  padding: 1rem 1.5rem;
  background-color: var(--color-bg, #ffffff);
  border-bottom: 1px solid var(--color-border, #e5e7eb);
  font-family: var(--font-body, system-ui, sans-serif);
">
  <div style="
    max-width: var(--container-max, 1200px);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  ">
    <a href="{{logo_url}}" style="
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    ">
      <img src="{{logo_src}}" alt="{{logo_alt}}" style="
        height: clamp(28px, 4vw, 40px);
        width: auto;
      " loading="eager">
    </a>

    <a href="{{cta_url}}" style="
      display: inline-block;
      background-color: var(--color-primary, #4f46e5);
      color: #ffffff;
      font-family: var(--font-body, system-ui, sans-serif);
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.6rem 1.5rem;
      border-radius: var(--radius, 0.5rem);
      text-decoration: none;
      transition: background-color 0.2s ease, transform 0.2s ease;
    " onmouseover="this.style.backgroundColor='var(--color-secondary, #4338ca)';this.style.transform='translateY(-1px)'" onmouseout="this.style.backgroundColor='var(--color-primary, #4f46e5)';this.style.transform='translateY(0)'">{{cta_text}}</a>
  </div>
</header>
