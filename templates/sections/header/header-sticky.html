<header id="sticky-header" style="
  position: sticky;
  top: 0;
  z-index: 1000;
  padding: 1rem 1.5rem;
  background-color: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--color-border, #e5e7eb);
  font-family: var(--font-body, system-ui, sans-serif);
  transition: padding 0.3s ease, box-shadow 0.3s ease;
">
  <div style="
    max-width: var(--container-max, 1200px);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  ">
    <a href="{{logo_url}}" style="
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    ">
      <img src="{{logo_src}}" alt="{{logo_alt}}" style="
        height: clamp(28px, 4vw, 40px);
        width: auto;
        transition: height 0.3s ease;
      " loading="eager">
    </a>

    <nav style="
      display: flex;
      align-items: center;
      gap: clamp(1rem, 2vw, 2rem);
    ">
      <a href="{{nav_1_url}}" style="
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--color-muted, #6b7280);
        text-decoration: none;
        transition: color 0.2s ease;
        display: none;
      " onmouseover="this.style.color='var(--color-text, #1a1a2e)'" onmouseout="this.style.color='var(--color-muted, #6b7280)'">{{nav_1_text}}</a>

      <a href="{{nav_2_url}}" style="
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--color-muted, #6b7280);
        text-decoration: none;
        transition: color 0.2s ease;
        display: none;
      " onmouseover="this.style.color='var(--color-text, #1a1a2e)'" onmouseout="this.style.color='var(--color-muted, #6b7280)'">{{nav_2_text}}</a>

      <a href="{{nav_3_url}}" style="
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--color-muted, #6b7280);
        text-decoration: none;
        transition: color 0.2s ease;
        display: none;
      " onmouseover="this.style.color='var(--color-text, #1a1a2e)'" onmouseout="this.style.color='var(--color-muted, #6b7280)'">{{nav_3_text}}</a>

      <a href="{{cta_url}}" style="
        display: inline-block;
        background-color: var(--color-primary, #4f46e5);
        color: #ffffff;
        font-family: var(--font-body, system-ui, sans-serif);
        font-size: 0.9rem;
        font-weight: 700;
        padding: 0.6rem 1.5rem;
        border-radius: var(--radius, 0.5rem);
        text-decoration: none;
        transition: background-color 0.2s ease, transform 0.2s ease;
      " onmouseover="this.style.backgroundColor='var(--color-secondary, #4338ca)';this.style.transform='translateY(-1px)'" onmouseout="this.style.backgroundColor='var(--color-primary, #4f46e5)';this.style.transform='translateY(0)'">{{cta_text}}</a>
    </nav>
  </div>
</header>

<script>
(function() {
  var header = document.getElementById('sticky-header');
  var lastScroll = 0;
  window.addEventListener('scroll', function() {
    var scrollY = window.scrollY;
    if (scrollY > 50) {
      header.style.padding = '0.6rem 1.5rem';
      header.style.boxShadow = '0 2px 12px rgba(0,0,0,0.06)';
    } else {
      header.style.padding = '1rem 1.5rem';
      header.style.boxShadow = 'none';
    }
    lastScroll = scrollY;
  });
})();
</script>

<style>
  @media (min-width: 768px) {
    #sticky-header nav a {
      display: inline-block !important;
    }
  }
</style>
