<section style="
  padding: var(--section-padding, 5rem 1.5rem);
  background-color: var(--color-bg, #ffffff);
  color: var(--color-text, #1a1a2e);
  font-family: var(--font-body, system-ui, sans-serif);
">
  <div style="
    max-width: var(--container-max, 1000px);
    margin: 0 auto;
    text-align: center;
  ">
    <h2 style="
      font-family: var(--font-heading, system-ui, sans-serif);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 800;
      line-height: 1.2;
      margin: 0 0 3rem 0;
      color: var(--color-text, #1a1a2e);
    ">{{section_headline}}</h2>

    <div style="
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      text-align: left;
    ">
      <!-- Before -->
      <div style="
        background-color: var(--color-surface, #f9fafb);
        border: 2px solid #fecaca;
        border-radius: var(--radius, 0.5rem);
        padding: 2rem;
      ">
        <div style="
          display: flex;
          align-items: center;
          gap: 0.75rem;
          margin-bottom: 1.5rem;
        ">
          <span style="
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background-color: #fecaca;
            color: #dc2626;
            border-radius: 50%;
            font-size: 1.25rem;
            font-weight: 700;
          ">&#x2717;</span>
          <h3 style="
            font-family: var(--font-heading, system-ui, sans-serif);
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
            color: #dc2626;
          ">{{before_title}}</h3>
        </div>
        <div style="
          font-size: 1rem;
          line-height: 2;
          color: var(--color-muted, #6b7280);
        ">{{before_items}}</div>
      </div>

      <!-- Transition -->
      <div style="
        text-align: center;
        padding: 0.5rem;
      ">
        <span style="
          display: inline-block;
          font-size: 2rem;
          color: var(--color-primary, #4f46e5);
          transform: rotate(90deg);
        ">&#x27A1;</span>
        <p style="
          font-size: 1rem;
          font-weight: 600;
          color: var(--color-primary, #4f46e5);
          margin: 0.5rem 0 0 0;
        ">{{transition_text}}</p>
      </div>

      <!-- After -->
      <div style="
        background-color: var(--color-surface, #f9fafb);
        border: 2px solid #bbf7d0;
        border-radius: var(--radius, 0.5rem);
        padding: 2rem;
      ">
        <div style="
          display: flex;
          align-items: center;
          gap: 0.75rem;
          margin-bottom: 1.5rem;
        ">
          <span style="
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background-color: #bbf7d0;
            color: #16a34a;
            border-radius: 50%;
            font-size: 1.25rem;
            font-weight: 700;
          ">&#x2713;</span>
          <h3 style="
            font-family: var(--font-heading, system-ui, sans-serif);
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
            color: #16a34a;
          ">{{after_title}}</h3>
        </div>
        <div style="
          font-size: 1rem;
          line-height: 2;
          color: var(--color-muted, #6b7280);
        ">{{after_items}}</div>
      </div>
    </div>
  </div>

  <style>
    @media (min-width: 768px) {
      section > div > div:nth-child(2) {
        grid-template-columns: 1fr auto 1fr !important;
      }
      section > div > div:nth-child(2) > div:nth-child(2) span:first-child {
        transform: rotate(0deg) !important;
      }
    }
  </style>
</section>
