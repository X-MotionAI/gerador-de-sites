<section style="
  padding: clamp(2.5rem, 5vw, 4rem) 1.5rem;
  background-color: var(--color-surface, #f9fafb);
  font-family: var(--font-body, system-ui, sans-serif);
">
  <div style="
    max-width: var(--container-max, 1000px);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    align-items: center;
    text-align: center;
    background: linear-gradient(135deg, var(--color-primary, #4f46e5), var(--color-secondary, #4338ca));
    border-radius: var(--radius, 0.5rem);
    padding: clamp(2rem, 4vw, 3rem);
  ">
    <div style="flex: 1;">
      <h2 style="
        font-family: var(--font-heading, system-ui, sans-serif);
        font-size: clamp(1.25rem, 3vw, 2rem);
        font-weight: 800;
        line-height: 1.2;
        margin: 0 0 0.5rem 0;
        color: #ffffff;
      ">{{headline}}</h2>
      <p style="
        font-size: clamp(0.9rem, 2vw, 1.05rem);
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.8);
        margin: 0;
      ">{{subtext}}</p>
    </div>

    <a href="{{cta_url}}" style="
      display: inline-block;
      background-color: var(--color-accent, #f0c040);
      color: var(--color-text, #1a1a2e);
      font-family: var(--font-body, system-ui, sans-serif);
      font-size: 1rem;
      font-weight: 700;
      padding: 0.9rem 2.5rem;
      border-radius: var(--radius, 0.5rem);
      text-decoration: none;
      white-space: nowrap;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
      flex-shrink: 0;
    " onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(0,0,0,0.3)'" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 14px rgba(0,0,0,0.2)'">{{cta_text}}</a>
  </div>

  <style>
    @media (min-width: 768px) {
      section > div {
        flex-direction: row !important;
        text-align: left !important;
        justify-content: space-between !important;
      }
    }
  </style>
</section>
