<div style="
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  z-index: 9999;
  background-color: var(--color-bg, #ffffff);
  border-top: 1px solid var(--color-border, #e5e7eb);
  box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
  font-family: var(--font-body, system-ui, sans-serif);
  padding: 0.75rem 1.5rem;
">
  <div style="
    max-width: var(--container-max, 1100px);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    align-items: center;
    justify-content: center;
    text-align: center;
  ">
    <div style="
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    ">
      <span style="
        font-size: clamp(0.85rem, 2vw, 1rem);
        font-weight: 600;
        color: var(--color-text, #1a1a2e);
      ">{{headline}}</span>

      <a href="{{cta_url}}" style="
        display: inline-block;
        background-color: var(--color-primary, #4f46e5);
        color: #ffffff;
        font-family: var(--font-body, system-ui, sans-serif);
        font-size: clamp(0.85rem, 2vw, 1rem);
        font-weight: 700;
        padding: 0.65rem 1.75rem;
        border-radius: var(--radius, 0.5rem);
        text-decoration: none;
        white-space: nowrap;
        transition: background-color 0.2s ease, transform 0.2s ease;
        box-shadow: 0 2px 10px rgba(79, 70, 229, 0.3);
      " onmouseover="this.style.backgroundColor='var(--color-secondary, #4338ca)';this.style.transform='translateY(-1px)'" onmouseout="this.style.backgroundColor='var(--color-primary, #4f46e5)';this.style.transform='translateY(0)'">{{cta_text}}</a>
    </div>
  </div>
</div>
