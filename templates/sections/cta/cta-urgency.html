<section style="
  padding: var(--section-padding, 5rem 1.5rem);
  background: linear-gradient(135deg, var(--color-primary, #4f46e5), var(--color-secondary, #4338ca));
  font-family: var(--font-body, system-ui, sans-serif);
  text-align: center;
">
  <div style="
    max-width: 680px;
    margin: 0 auto;
  ">
    <!-- Urgency badge -->
    <div style="
      display: inline-block;
      background-color: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      color: #ffffff;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.5rem 1.25rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 1px solid rgba(255, 255, 255, 0.2);
    ">{{urgency_badge}}</div>

    <h2 style="
      font-family: var(--font-heading, system-ui, sans-serif);
      font-size: clamp(1.5rem, 4vw, 2.75rem);
      font-weight: 800;
      line-height: 1.2;
      margin: 0 0 1rem 0;
      color: #ffffff;
    ">{{headline}}</h2>

    <p style="
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
      margin: 0 auto 2rem auto;
      max-width: 520px;
    ">{{subtext}}</p>

    <!-- Countdown timer -->
    <div style="
      display: flex;
      justify-content: center;
      gap: clamp(0.75rem, 2vw, 1.5rem);
      margin-bottom: 2.5rem;
    " id="countdown-timer">
      <div style="text-align: center;">
        <div style="
          font-family: var(--font-heading, system-ui, sans-serif);
          font-size: clamp(1.5rem, 4vw, 2.5rem);
          font-weight: 800;
          color: #ffffff;
          background-color: rgba(255, 255, 255, 0.1);
          border-radius: var(--radius, 0.5rem);
          padding: 0.75rem 1rem;
          min-width: 60px;
        " data-countdown="hours">{{timer_hours}}</div>
        <div style="font-size: 0.75rem; color: rgba(255,255,255,0.6); margin-top: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em;">Horas</div>
      </div>
      <div style="text-align: center;">
        <div style="
          font-family: var(--font-heading, system-ui, sans-serif);
          font-size: clamp(1.5rem, 4vw, 2.5rem);
          font-weight: 800;
          color: #ffffff;
          background-color: rgba(255, 255, 255, 0.1);
          border-radius: var(--radius, 0.5rem);
          padding: 0.75rem 1rem;
          min-width: 60px;
        " data-countdown="minutes">{{timer_minutes}}</div>
        <div style="font-size: 0.75rem; color: rgba(255,255,255,0.6); margin-top: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em;">Minutos</div>
      </div>
      <div style="text-align: center;">
        <div style="
          font-family: var(--font-heading, system-ui, sans-serif);
          font-size: clamp(1.5rem, 4vw, 2.5rem);
          font-weight: 800;
          color: #ffffff;
          background-color: rgba(255, 255, 255, 0.1);
          border-radius: var(--radius, 0.5rem);
          padding: 0.75rem 1rem;
          min-width: 60px;
        " data-countdown="seconds">{{timer_seconds}}</div>
        <div style="font-size: 0.75rem; color: rgba(255,255,255,0.6); margin-top: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em;">Segundos</div>
      </div>
    </div>

    <a href="{{cta_url}}" style="
      display: inline-block;
      background-color: var(--color-accent, #f0c040);
      color: var(--color-text, #1a1a2e);
      font-family: var(--font-body, system-ui, sans-serif);
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 700;
      padding: 1.1rem 3rem;
      border-radius: var(--radius, 0.5rem);
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      animation: pulse-cta 2s ease-in-out infinite;
    " onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 30px rgba(0,0,0,0.3)'" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 20px rgba(0,0,0,0.2)'">{{cta_text}}</a>

    <p style="
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 1rem;
    ">{{scarcity_text}}</p>
  </div>

  <style>
    @keyframes pulse-cta {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
  </style>
</section>
