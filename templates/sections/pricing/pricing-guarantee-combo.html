<section style="
  padding: var(--section-padding, 5rem 1.5rem);
  background-color: var(--color-bg, #ffffff);
  color: var(--color-text, #1a1a2e);
  font-family: var(--font-body, system-ui, sans-serif);
">
  <div style="
    max-width: 560px;
    margin: 0 auto;
    text-align: center;
  ">
    <h2 style="
      font-family: var(--font-heading, system-ui, sans-serif);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 800;
      line-height: 1.2;
      margin: 0 0 2.5rem 0;
      color: var(--color-text, #1a1a2e);
    ">{{section_headline}}</h2>

    <!-- Pricing card -->
    <div style="
      background-color: var(--color-surface, #f9fafb);
      border: 2px solid var(--color-primary, #4f46e5);
      border-radius: var(--radius, 0.5rem);
      padding: 3rem 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 40px rgba(79, 70, 229, 0.12);
    ">
      <div style="
        font-family: var(--font-heading, system-ui, sans-serif);
        font-size: clamp(2.5rem, 6vw, 4rem);
        font-weight: 800;
        color: var(--color-text, #1a1a2e);
        line-height: 1;
        margin-bottom: 0.25rem;
      ">{{price}}</div>
      <div style="
        font-size: 0.95rem;
        color: var(--color-muted, #6b7280);
        margin-bottom: 2rem;
      ">{{period}}</div>

      <div style="
        text-align: left;
        margin-bottom: 2rem;
        font-size: 1rem;
        line-height: 2.2;
        color: var(--color-text, #1a1a2e);
      ">{{features}}</div>

      <a href="{{cta_url}}" style="
        display: block;
        width: 100%;
        padding: 1rem;
        background-color: var(--color-primary, #4f46e5);
        color: #ffffff;
        font-family: var(--font-body, system-ui, sans-serif);
        font-size: 1.125rem;
        font-weight: 700;
        border: none;
        border-radius: var(--radius, 0.5rem);
        text-decoration: none;
        text-align: center;
        cursor: pointer;
        transition: background-color 0.2s ease, transform 0.2s ease;
        box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3);
        box-sizing: border-box;
      " onmouseover="this.style.backgroundColor='var(--color-secondary, #4338ca)';this.style.transform='translateY(-2px)'" onmouseout="this.style.backgroundColor='var(--color-primary, #4f46e5)';this.style.transform='translateY(0)'">{{cta_text}}</a>
    </div>

    <!-- Guarantee -->
    <div style="
      background-color: var(--color-surface, #f9fafb);
      border: 1px solid var(--color-border, #e5e7eb);
      border-radius: var(--radius, 0.5rem);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    ">
      <div style="
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f0fdf4;
        border-radius: 50%;
        font-size: 2rem;
      ">&#x1F6E1;</div>
      <div style="
        font-family: var(--font-heading, system-ui, sans-serif);
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--color-text, #1a1a2e);
      ">Garantia de {{guarantee_duration}}</div>
      <p style="
        font-size: 0.95rem;
        line-height: 1.6;
        color: var(--color-muted, #6b7280);
        margin: 0;
        max-width: 400px;
      ">{{guarantee_text}}</p>
    </div>
  </div>
</section>
