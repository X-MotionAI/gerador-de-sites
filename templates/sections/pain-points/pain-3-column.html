<section style="
  padding: var(--section-padding, 5rem 1.5rem);
  background-color: var(--color-surface, #f9fafb);
  color: var(--color-text, #1a1a2e);
  font-family: var(--font-body, system-ui, sans-serif);
">
  <div style="
    max-width: var(--container-max, 1100px);
    margin: 0 auto;
    text-align: center;
  ">
    <h2 style="
      font-family: var(--font-heading, system-ui, sans-serif);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 800;
      line-height: 1.2;
      margin: 0 0 3rem 0;
      color: var(--color-text, #1a1a2e);
    ">{{section_headline}}</h2>

    <div style="
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    ">
      <!-- Pain 1 -->
      <div style="
        background-color: var(--color-bg, #ffffff);
        border: 1px solid var(--color-border, #e5e7eb);
        border-radius: var(--radius, 0.5rem);
        padding: 2rem 1.5rem;
        text-align: center;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      " onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 12px 40px rgba(0,0,0,0.08)'" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='none'">
        <div style="font-size: 2.5rem; margin-bottom: 1rem;">{{pain_1_icon}}</div>
        <h3 style="
          font-family: var(--font-heading, system-ui, sans-serif);
          font-size: 1.25rem;
          font-weight: 700;
          margin: 0 0 0.75rem 0;
          color: var(--color-text, #1a1a2e);
        ">{{pain_1_title}}</h3>
        <p style="
          font-size: 1rem;
          line-height: 1.6;
          color: var(--color-muted, #6b7280);
          margin: 0;
        ">{{pain_1_text}}</p>
      </div>

      <!-- Pain 2 -->
      <div style="
        background-color: var(--color-bg, #ffffff);
        border: 1px solid var(--color-border, #e5e7eb);
        border-radius: var(--radius, 0.5rem);
        padding: 2rem 1.5rem;
        text-align: center;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      " onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 12px 40px rgba(0,0,0,0.08)'" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='none'">
        <div style="font-size: 2.5rem; margin-bottom: 1rem;">{{pain_2_icon}}</div>
        <h3 style="
          font-family: var(--font-heading, system-ui, sans-serif);
          font-size: 1.25rem;
          font-weight: 700;
          margin: 0 0 0.75rem 0;
          color: var(--color-text, #1a1a2e);
        ">{{pain_2_title}}</h3>
        <p style="
          font-size: 1rem;
          line-height: 1.6;
          color: var(--color-muted, #6b7280);
          margin: 0;
        ">{{pain_2_text}}</p>
      </div>

      <!-- Pain 3 -->
      <div style="
        background-color: var(--color-bg, #ffffff);
        border: 1px solid var(--color-border, #e5e7eb);
        border-radius: var(--radius, 0.5rem);
        padding: 2rem 1.5rem;
        text-align: center;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      " onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 12px 40px rgba(0,0,0,0.08)'" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='none'">
        <div style="font-size: 2.5rem; margin-bottom: 1rem;">{{pain_3_icon}}</div>
        <h3 style="
          font-family: var(--font-heading, system-ui, sans-serif);
          font-size: 1.25rem;
          font-weight: 700;
          margin: 0 0 0.75rem 0;
          color: var(--color-text, #1a1a2e);
        ">{{pain_3_title}}</h3>
        <p style="
          font-size: 1rem;
          line-height: 1.6;
          color: var(--color-muted, #6b7280);
          margin: 0;
        ">{{pain_3_text}}</p>
      </div>
    </div>

    <p style="
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.6;
      color: var(--color-text, #1a1a2e);
      margin: 3rem auto 0 auto;
      max-width: 600px;
      font-weight: 600;
    ">{{transition_text}}</p>
  </div>

  <style>
    @media (min-width: 768px) {
      section > div > div:nth-child(2) {
        grid-template-columns: repeat(3, 1fr) !important;
      }
    }
  </style>
</section>
