<section style="
  padding: var(--section-padding, 5rem 1.5rem);
  background-color: var(--color-bg, #ffffff);
  color: var(--color-text, #1a1a2e);
  font-family: var(--font-body, system-ui, sans-serif);
">
  <div style="
    max-width: 720px;
    margin: 0 auto;
  ">
    <h2 style="
      font-family: var(--font-heading, system-ui, sans-serif);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 800;
      line-height: 1.2;
      margin: 0 0 2rem 0;
      color: var(--color-text, #1a1a2e);
      text-align: center;
    ">{{section_headline}}</h2>

    <div style="
      font-size: clamp(1rem, 2vw, 1.125rem);
      line-height: 1.8;
      color: var(--color-muted, #6b7280);
      margin-bottom: 2.5rem;
    ">{{story_text}}</div>

    <div style="
      background-color: var(--color-surface, #f9fafb);
      border-left: 4px solid var(--color-accent, #ef4444);
      border-radius: 0 var(--radius, 0.5rem) var(--radius, 0.5rem) 0;
      padding: 1.5rem 2rem;
      margin-bottom: 2.5rem;
    ">
      <div style="
        font-size: 1rem;
        line-height: 2;
        color: var(--color-text, #1a1a2e);
      ">{{pain_items}}</div>
    </div>

    <div style="
      background: linear-gradient(135deg, var(--color-primary, #4f46e5), var(--color-secondary, #4338ca));
      border-radius: var(--radius, 0.5rem);
      padding: 2rem;
      text-align: center;
    ">
      <p style="
        font-size: clamp(1.05rem, 2vw, 1.2rem);
        line-height: 1.7;
        color: #ffffff;
        margin: 0;
        font-weight: 500;
      ">{{consequence_text}}</p>
    </div>
  </div>
</section>
