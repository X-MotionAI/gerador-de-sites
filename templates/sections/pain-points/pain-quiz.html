<section style="
  padding: var(--section-padding, 5rem 1.5rem);
  background-color: var(--color-surface, #f9fafb);
  color: var(--color-text, #1a1a2e);
  font-family: var(--font-body, system-ui, sans-serif);
">
  <div style="
    max-width: 680px;
    margin: 0 auto;
    text-align: center;
  ">
    <h2 style="
      font-family: var(--font-heading, system-ui, sans-serif);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 800;
      line-height: 1.2;
      margin: 0 0 2.5rem 0;
      color: var(--color-text, #1a1a2e);
    ">{{section_headline}}</h2>

    <div style="
      display: flex;
      flex-direction: column;
      gap: 1rem;
      text-align: left;
      margin-bottom: 2.5rem;
    ">
      <label style="
        display: flex;
        align-items: flex-start;
        gap: 1rem;
        background-color: var(--color-bg, #ffffff);
        border: 2px solid var(--color-border, #e5e7eb);
        border-radius: var(--radius, 0.5rem);
        padding: 1.25rem 1.5rem;
        cursor: pointer;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
        font-size: 1rem;
        line-height: 1.5;
        color: var(--color-text, #1a1a2e);
      " onmouseover="this.style.borderColor='var(--color-primary, #4f46e5)';this.style.boxShadow='0 0 0 3px rgba(79,70,229,0.1)'" onmouseout="this.style.borderColor='var(--color-border, #e5e7eb)';this.style.boxShadow='none'">
        <input type="checkbox" style="margin-top: 3px; accent-color: var(--color-primary, #4f46e5); width: 18px; height: 18px; flex-shrink: 0;">
        <span>{{question_1}}</span>
      </label>

      <label style="
        display: flex;
        align-items: flex-start;
        gap: 1rem;
        background-color: var(--color-bg, #ffffff);
        border: 2px solid var(--color-border, #e5e7eb);
        border-radius: var(--radius, 0.5rem);
        padding: 1.25rem 1.5rem;
        cursor: pointer;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
        font-size: 1rem;
        line-height: 1.5;
        color: var(--color-text, #1a1a2e);
      " onmouseover="this.style.borderColor='var(--color-primary, #4f46e5)';this.style.boxShadow='0 0 0 3px rgba(79,70,229,0.1)'" onmouseout="this.style.borderColor='var(--color-border, #e5e7eb)';this.style.boxShadow='none'">
        <input type="checkbox" style="margin-top: 3px; accent-color: var(--color-primary, #4f46e5); width: 18px; height: 18px; flex-shrink: 0;">
        <span>{{question_2}}</span>
      </label>

      <label style="
        display: flex;
        align-items: flex-start;
        gap: 1rem;
        background-color: var(--color-bg, #ffffff);
        border: 2px solid var(--color-border, #e5e7eb);
        border-radius: var(--radius, 0.5rem);
        padding: 1.25rem 1.5rem;
        cursor: pointer;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
        font-size: 1rem;
        line-height: 1.5;
        color: var(--color-text, #1a1a2e);
      " onmouseover="this.style.borderColor='var(--color-primary, #4f46e5)';this.style.boxShadow='0 0 0 3px rgba(79,70,229,0.1)'" onmouseout="this.style.borderColor='var(--color-border, #e5e7eb)';this.style.boxShadow='none'">
        <input type="checkbox" style="margin-top: 3px; accent-color: var(--color-primary, #4f46e5); width: 18px; height: 18px; flex-shrink: 0;">
        <span>{{question_3}}</span>
      </label>

      <label style="
        display: flex;
        align-items: flex-start;
        gap: 1rem;
        background-color: var(--color-bg, #ffffff);
        border: 2px solid var(--color-border, #e5e7eb);
        border-radius: var(--radius, 0.5rem);
        padding: 1.25rem 1.5rem;
        cursor: pointer;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
        font-size: 1rem;
        line-height: 1.5;
        color: var(--color-text, #1a1a2e);
      " onmouseover="this.style.borderColor='var(--color-primary, #4f46e5)';this.style.boxShadow='0 0 0 3px rgba(79,70,229,0.1)'" onmouseout="this.style.borderColor='var(--color-border, #e5e7eb)';this.style.boxShadow='none'">
        <input type="checkbox" style="margin-top: 3px; accent-color: var(--color-primary, #4f46e5); width: 18px; height: 18px; flex-shrink: 0;">
        <span>{{question_4}}</span>
      </label>
    </div>

    <div style="
      background: linear-gradient(135deg, var(--color-primary, #4f46e5), var(--color-secondary, #4338ca));
      border-radius: var(--radius, 0.5rem);
      padding: 2rem;
      text-align: center;
    ">
      <p style="
        font-size: clamp(1rem, 2vw, 1.15rem);
        line-height: 1.7;
        color: #ffffff;
        margin: 0;
        font-weight: 500;
      ">{{result_text}}</p>
    </div>
  </div>
</section>
