<section style="
  padding: var(--section-padding, 5rem 1.5rem);
  background-color: var(--color-bg, #ffffff);
  color: var(--color-text, #1a1a2e);
  font-family: var(--font-body, system-ui, sans-serif);
">
  <div style="
    max-width: var(--container-max, 900px);
    margin: 0 auto;
  ">
    <h2 style="
      font-family: var(--font-heading, system-ui, sans-serif);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 800;
      line-height: 1.2;
      margin: 0 0 2.5rem 0;
      color: var(--color-text, #1a1a2e);
      text-align: center;
    ">{{section_headline}}</h2>

    <div style="
      background-color: var(--color-surface, #f9fafb);
      border: 1px solid var(--color-border, #e5e7eb);
      border-radius: var(--radius, 0.5rem);
      overflow: hidden;
    ">
      <!-- Company header -->
      <div style="
        padding: 2rem;
        display: flex;
        align-items: center;
        gap: 1.25rem;
        border-bottom: 1px solid var(--color-border, #e5e7eb);
      ">
        <img src="{{company_logo}}" alt="{{company_name}}" style="
          height: 48px;
          width: auto;
          flex-shrink: 0;
        " loading="lazy">
        <span style="
          font-family: var(--font-heading, system-ui, sans-serif);
          font-size: 1.25rem;
          font-weight: 700;
          color: var(--color-text, #1a1a2e);
        ">{{company_name}}</span>
      </div>

      <!-- Challenge / Solution / Result -->
      <div style="
        display: grid;
        grid-template-columns: 1fr;
        gap: 0;
      ">
        <div style="padding: 2rem; border-bottom: 1px solid var(--color-border, #e5e7eb);">
          <div style="
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #dc2626;
            background-color: #fef2f2;
            padding: 0.3rem 0.75rem;
            border-radius: 999px;
            margin-bottom: 0.75rem;
          ">Desafio</div>
          <p style="font-size: 1rem; line-height: 1.7; color: var(--color-muted, #6b7280); margin: 0;">{{challenge}}</p>
        </div>

        <div style="padding: 2rem; border-bottom: 1px solid var(--color-border, #e5e7eb);">
          <div style="
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--color-primary, #4f46e5);
            background-color: rgba(79, 70, 229, 0.08);
            padding: 0.3rem 0.75rem;
            border-radius: 999px;
            margin-bottom: 0.75rem;
          ">Solucao</div>
          <p style="font-size: 1rem; line-height: 1.7; color: var(--color-muted, #6b7280); margin: 0;">{{solution}}</p>
        </div>

        <div style="padding: 2rem; border-bottom: 1px solid var(--color-border, #e5e7eb);">
          <div style="
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #16a34a;
            background-color: #f0fdf4;
            padding: 0.3rem 0.75rem;
            border-radius: 999px;
            margin-bottom: 0.75rem;
          ">Resultado</div>
          <p style="font-size: 1rem; line-height: 1.7; color: var(--color-muted, #6b7280); margin: 0;">{{result}}</p>
        </div>
      </div>

      <!-- Quote -->
      <div style="
        padding: 2rem;
        background-color: var(--color-bg, #ffffff);
      ">
        <blockquote style="
          font-size: clamp(1rem, 2vw, 1.1rem);
          line-height: 1.8;
          color: var(--color-text, #1a1a2e);
          font-style: italic;
          margin: 0 0 1rem 0;
          border-left: 3px solid var(--color-primary, #4f46e5);
          padding-left: 1.25rem;
        ">"{{quote}}"</blockquote>
        <div style="
          font-size: 0.9rem;
          font-weight: 600;
          color: var(--color-muted, #6b7280);
          padding-left: 1.5rem;
        ">-- {{quote_author}}</div>
      </div>
    </div>
  </div>
</section>
