<section style="
  padding: var(--section-padding, 5rem 1.5rem);
  background-color: var(--color-bg, #ffffff);
  color: var(--color-text, #1a1a2e);
  font-family: var(--font-body, system-ui, sans-serif);
  overflow: hidden;
">
  <div style="
    max-width: var(--container-max, 800px);
    margin: 0 auto;
    text-align: center;
  ">
    <h2 style="
      font-family: var(--font-heading, system-ui, sans-serif);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 800;
      line-height: 1.2;
      margin: 0 0 3rem 0;
      color: var(--color-text, #1a1a2e);
    ">{{section_headline}}</h2>

    <div class="testimonial-carousel" style="position: relative;">
      <div class="testimonial-track" style="
        display: flex;
        transition: transform 0.5s ease;
      ">
        <!-- Slide 1 -->
        <div class="testimonial-slide" style="
          min-width: 100%;
          padding: 0 1rem;
          box-sizing: border-box;
        ">
          <div style="
            background-color: var(--color-surface, #f9fafb);
            border-radius: var(--radius, 0.5rem);
            padding: 2.5rem 2rem;
            max-width: 600px;
            margin: 0 auto;
          ">
            <div style="color: var(--color-accent, #f0c040); font-size: 1.25rem; margin-bottom: 1.25rem; letter-spacing: 2px;">&#9733;&#9733;&#9733;&#9733;&#9733;</div>
            <p style="font-size: clamp(1rem, 2vw, 1.15rem); line-height: 1.8; color: var(--color-text, #1a1a2e); margin: 0 0 1.5rem 0; font-style: italic;">"{{testimonial_1_quote}}"</p>
            <div style="font-weight: 700; font-size: 1rem; color: var(--color-text, #1a1a2e);">{{testimonial_1_name}}</div>
            <div style="font-size: 0.875rem; color: var(--color-muted, #6b7280);">{{testimonial_1_title}}</div>
          </div>
        </div>

        <!-- Slide 2 -->
        <div class="testimonial-slide" style="
          min-width: 100%;
          padding: 0 1rem;
          box-sizing: border-box;
        ">
          <div style="
            background-color: var(--color-surface, #f9fafb);
            border-radius: var(--radius, 0.5rem);
            padding: 2.5rem 2rem;
            max-width: 600px;
            margin: 0 auto;
          ">
            <div style="color: var(--color-accent, #f0c040); font-size: 1.25rem; margin-bottom: 1.25rem; letter-spacing: 2px;">&#9733;&#9733;&#9733;&#9733;&#9733;</div>
            <p style="font-size: clamp(1rem, 2vw, 1.15rem); line-height: 1.8; color: var(--color-text, #1a1a2e); margin: 0 0 1.5rem 0; font-style: italic;">"{{testimonial_2_quote}}"</p>
            <div style="font-weight: 700; font-size: 1rem; color: var(--color-text, #1a1a2e);">{{testimonial_2_name}}</div>
            <div style="font-size: 0.875rem; color: var(--color-muted, #6b7280);">{{testimonial_2_title}}</div>
          </div>
        </div>

        <!-- Slide 3 -->
        <div class="testimonial-slide" style="
          min-width: 100%;
          padding: 0 1rem;
          box-sizing: border-box;
        ">
          <div style="
            background-color: var(--color-surface, #f9fafb);
            border-radius: var(--radius, 0.5rem);
            padding: 2.5rem 2rem;
            max-width: 600px;
            margin: 0 auto;
          ">
            <div style="color: var(--color-accent, #f0c040); font-size: 1.25rem; margin-bottom: 1.25rem; letter-spacing: 2px;">&#9733;&#9733;&#9733;&#9733;&#9733;</div>
            <p style="font-size: clamp(1rem, 2vw, 1.15rem); line-height: 1.8; color: var(--color-text, #1a1a2e); margin: 0 0 1.5rem 0; font-style: italic;">"{{testimonial_3_quote}}"</p>
            <div style="font-weight: 700; font-size: 1rem; color: var(--color-text, #1a1a2e);">{{testimonial_3_name}}</div>
            <div style="font-size: 0.875rem; color: var(--color-muted, #6b7280);">{{testimonial_3_title}}</div>
          </div>
        </div>
      </div>

      <!-- Navigation dots -->
      <div style="
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 2rem;
      ">
        <button onclick="this.closest('.testimonial-carousel').querySelector('.testimonial-track').style.transform='translateX(0%)'" style="
          width: 12px; height: 12px; border-radius: 50%; border: none;
          background-color: var(--color-primary, #4f46e5); cursor: pointer;
          transition: opacity 0.2s ease; padding: 0;
        " onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'"></button>
        <button onclick="this.closest('.testimonial-carousel').querySelector('.testimonial-track').style.transform='translateX(-100%)'" style="
          width: 12px; height: 12px; border-radius: 50%; border: none;
          background-color: var(--color-border, #e5e7eb); cursor: pointer;
          transition: opacity 0.2s ease; padding: 0;
        " onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'"></button>
        <button onclick="this.closest('.testimonial-carousel').querySelector('.testimonial-track').style.transform='translateX(-200%)'" style="
          width: 12px; height: 12px; border-radius: 50%; border: none;
          background-color: var(--color-border, #e5e7eb); cursor: pointer;
          transition: opacity 0.2s ease; padding: 0;
        " onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'"></button>
      </div>

      <!-- Arrow buttons -->
      <button onclick="var t=this.closest('.testimonial-carousel').querySelector('.testimonial-track');var m=t.style.transform.match(/-?\d+/);var c=m?parseInt(m[0]):0;if(c<0)t.style.transform='translateX('+(c+100)+'%)'" style="
        position: absolute;
        top: 50%;
        left: -0.5rem;
        transform: translateY(-50%);
        width: 40px; height: 40px;
        border-radius: 50%;
        border: 1px solid var(--color-border, #e5e7eb);
        background-color: var(--color-bg, #ffffff);
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.25rem;
        color: var(--color-text, #1a1a2e);
        transition: box-shadow 0.2s ease;
        padding: 0;
      " onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,0.1)'" onmouseout="this.style.boxShadow='none'">&#8249;</button>

      <button onclick="var t=this.closest('.testimonial-carousel').querySelector('.testimonial-track');var m=t.style.transform.match(/-?\d+/);var c=m?parseInt(m[0]):0;if(c>-200)t.style.transform='translateX('+(c-100)+'%)'" style="
        position: absolute;
        top: 50%;
        right: -0.5rem;
        transform: translateY(-50%);
        width: 40px; height: 40px;
        border-radius: 50%;
        border: 1px solid var(--color-border, #e5e7eb);
        background-color: var(--color-bg, #ffffff);
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.25rem;
        color: var(--color-text, #1a1a2e);
        transition: box-shadow 0.2s ease;
        padding: 0;
      " onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,0.1)'" onmouseout="this.style.boxShadow='none'">&#8250;</button>
    </div>
  </div>
</section>
